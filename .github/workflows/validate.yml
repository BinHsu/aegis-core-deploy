name: Validate

# Renders the kustomize overlays and enforces the ADR-10/14 release-model
# contract (ghcr-graviton pivot: AWS overlays resolve from public GHCR; the
# Talos overlay keeps the ADR-12 local-registry injection):
#
#   A. Digest-presence guard — every rendered image line must be
#      `<name>@sha256:<64-hex>`. Catches a revert of the digest pins (which
#      would render an un-pinned ref — a guaranteed ImagePullBackOff).
#
#   B. Registry guard —
#      * AWS overlays (staging/prod): the deploy repo carries the FULL static
#        public GHCR ref (DEPLOY-OWNS-STATIC-GHCR), so assert the rendered
#        output directly: gateway -> ghcr.io/binhsu/aegis-core-gateway,
#        engine + seed -> ghcr.io/binhsu/aegis-core-engine. No injection.
#      * Talos: replays what the platform ApplicationSet does (inject
#        `aegis.binhsu.org/ecr-repository` — a LOCAL registry on-prem — via
#        `kustomize edit add annotation` WITHOUT --force, exactly as ArgoCD),
#        then asserts the registry splices IN FRONT of the @sha256 digest.
#        Catches the "annotation already in kustomization file" conflict class
#        that broke ArgoCD on 2026-06-12.
#
#   C. seed==engine guard (ADR-14) — the engine seed Job must carry the SAME
#      digest as the engine Rollout. Divergence is a bug.
#
#   D. Move-together guard (ADR-14, prod, PRs only) — a prod-overlay PR must
#      change BOTH the gateway and engine digests or NEITHER. A PR bumping one
#      and leaving the other stale fails. (Atomic multi-image promotion.)
#
# Three overlays are validated: staging, prod (EKS, include components/aws-binding)
# and talos (on-prem, Gateway API). kustomize v5.8.1 is pinned + sha256-verified.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  kustomize-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Need history for the move-together base-ref render (guard D).
          fetch-depth: 0

      - name: Install kustomize v5.8.1 (pinned sha256)
        run: |
          set -euo pipefail
          KUSTOMIZE_VERSION="v5.8.1"
          KUSTOMIZE_TARBALL="kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          KUSTOMIZE_URL="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/${KUSTOMIZE_TARBALL}"
          KUSTOMIZE_SHA256="029a7f0f4e1932c52a0476cf02a0fd855c0bb85694b82c338fc648dcb53a819d"
          curl -fsSL "${KUSTOMIZE_URL}" -o "/tmp/${KUSTOMIZE_TARBALL}"
          echo "${KUSTOMIZE_SHA256}  /tmp/${KUSTOMIZE_TARBALL}" | sha256sum --check
          tar -xzf "/tmp/${KUSTOMIZE_TARBALL}" -C /usr/local/bin kustomize
          kustomize version

      - name: A. Digest-presence guard (ImagePullBackOff regression)
        run: |
          set -euo pipefail
          # ADR-10/14 digest model: EVERY image line must be pinned by
          # @sha256:<64-hex>. Bare name / tag / :latest => fail (ImagePullBackOff
          # risk). The aegis-core workload images render as bare
          # `aegis-core@sha256:…` (the platform splices the registry in front at
          # sync time — verified by guard B). The talos onprem-binding (WS2-2)
          # also carries third-party images (MinIO/mc/curl); those are pinned by
          # their own full digest and are equally acceptable here — the guard is
          # "is every image digest-pinned", not "is every image aegis-core".
          for overlay in staging prod talos; do
            echo "=== k8s/overlays/${overlay} (standalone) ==="
            kustomize build "k8s/overlays/${overlay}" > "rendered-${overlay}.yaml"
            image_lines="$(grep -E '^\s+image: ' "rendered-${overlay}.yaml")"
            echo "${image_lines}"
            bad="$(echo "${image_lines}" | grep -Ev '^[[:space:]]*image: [^[:space:]]+@sha256:[0-9a-f]{64}$' || true)"
            [ -z "${bad}" ] \
              || { echo "::error::${overlay}: image line(s) not digest-pinned as <name>@sha256:<64-hex> (digest pin or replacements wiring missing?):"; echo "${bad}"; exit 1; }
            echo "--- digest-presence: OK ---"
          done

      - name: B. Registry guard — AWS overlays render static GHCR; talos injection
        run: |
          set -euo pipefail
          # ghcr-graviton pivot: the AWS overlays (staging/prod) no longer take a
          # platform-injected registry. The deploy repo carries the FULL static
          # public GHCR ref (DEPLOY-OWNS-STATIC-GHCR), so we assert the rendered
          # output directly — no `kustomize edit add annotation` simulation:
          #   gateway -> ghcr.io/binhsu/aegis-core-gateway@sha256:<64-hex>
          #   engine  -> ghcr.io/binhsu/aegis-core-engine@sha256:<64-hex>
          #   seed    -> ghcr.io/binhsu/aegis-core-engine@sha256:<64-hex>  (ADR-14)
          GW_REF="ghcr.io/binhsu/aegis-core-gateway"
          EN_REF="ghcr.io/binhsu/aegis-core-engine"
          for overlay in staging prod; do
            echo "=== k8s/overlays/${overlay} (static GHCR) ==="
            image_lines="$(grep -E '^\s+image: ' "rendered-${overlay}.yaml")"
            echo "${image_lines}"
            # No leaked ECR / bare-aegis-core ref must survive the pivot.
            leaked="$(echo "${image_lines}" | grep -E '^[[:space:]]*image: (aegis-core@sha256:|[0-9]+\.dkr\.ecr\.)' || true)"
            [ -z "${leaked}" ] \
              || { echo "::error::${overlay}: pre-pivot image ref leaked (bare aegis-core or ECR URL — ghcr-graviton regression?):"; echo "${leaked}"; exit 1; }
            # Gateway image renders the static GHCR gateway ref.
            echo "${image_lines}" | grep -qE "^[[:space:]]*image: ${GW_REF}@sha256:[0-9a-f]{64}\$" \
              || { echo "::error::${overlay}: no ${GW_REF}@sha256:<digest> image — base GHCR ref / digest patch missing."; exit 1; }
            # Engine + seed both render the static GHCR engine ref (>= 2 lines).
            en_count="$(echo "${image_lines}" | grep -cE "^[[:space:]]*image: ${EN_REF}@sha256:[0-9a-f]{64}\$" || true)"
            [ "${en_count}" -ge 2 ] \
              || { echo "::error::${overlay}: expected engine+seed to both render ${EN_REF}@sha256:<digest> (found ${en_count})."; exit 1; }
            echo "--- static GHCR: OK ---"
          done
          # Talos KEEPS the registry-injection mechanism (on-prem LOCAL registry).
          # Replay what the platform ApplicationSet does: inject
          # `aegis.binhsu.org/ecr-repository` + `aegis.binhsu.org/region` via
          # `kustomize edit add annotation` WITHOUT --force (exactly as ArgoCD),
          # then assert the registry splices IN FRONT of the @sha256 digest.
          REGION="eu-central-1"
          TEST_REPO="registry.local:5000/aegis-core"
          echo "=== k8s/overlays/talos (injected LOCAL registry) ==="
          rm -rf /tmp/inject-sim
          cp -r k8s /tmp/inject-sim
          ( cd "/tmp/inject-sim/overlays/talos"
            kustomize edit add annotation \
              "aegis.binhsu.org/ecr-repository:${TEST_REPO}" \
              "aegis.binhsu.org/region:${REGION}" )
          kustomize build "/tmp/inject-sim/overlays/talos" > "rendered-talos-injected.yaml"
          image_lines="$(grep -E '^\s+image: ' "rendered-talos-injected.yaml")"
          echo "${image_lines}"
          # Only the aegis-core workload images are injected; the onprem-binding
          # third-party images (MinIO/mc/curl) are NOT targeted by the
          # replacements. Assert: (1) no aegis-core image left bare/un-injected,
          # (2) the registry-spliced form is present.
          leaked="$(echo "${image_lines}" | grep -E '^[[:space:]]*image: aegis-core@sha256:' || true)"
          [ -z "${leaked}" ] \
            || { echo "::error::talos: aegis-core image not injected (still bare aegis-core@sha256 — delimiter/index regression?):"; echo "${leaked}"; exit 1; }
          echo "${image_lines}" | grep -qE "^[[:space:]]*image: ${TEST_REPO}@sha256:[0-9a-f]{64}\$" \
            || { echo "::error::talos: no ${TEST_REPO}@sha256:<digest> image — registry splice did not apply."; exit 1; }
          echo "--- talos injection: OK ---"

      - name: C. seed==engine digest guard (ADR-14)
        run: |
          set -euo pipefail
          # yq is preinstalled on ubuntu-latest. Compare the engine Rollout's
          # image to the engine seed Job's image in each rendered overlay.
          for overlay in staging prod talos; do
            engine="$(yq ea 'select(.kind=="Rollout" and .metadata.name=="aegis-core-engine") | .spec.template.spec.containers[0].image' "rendered-${overlay}.yaml")"
            seed="$(yq ea 'select(.kind=="Job" and .metadata.name=="aegis-core-engine-seed") | .spec.template.spec.containers[0].image' "rendered-${overlay}.yaml")"
            echo "${overlay}: engine=${engine} seed=${seed}"
            [ "${engine}" = "${seed}" ] \
              || { echo "::error::${overlay}: seed Job image (${seed}) != engine Rollout image (${engine}) — ADR-14 seed==engine violated."; exit 1; }
            echo "--- seed==engine: OK ---"
          done

      - name: D. Move-together guard — prod gateway+engine digests (ADR-14, PRs)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # A prod promotion PR must change BOTH digests or NEITHER. Render the
          # prod overlay at the PR head and at the base ref, then compare.
          BASE_REF="${{ github.base_ref }}"
          git fetch --no-tags origin "${BASE_REF}" >/dev/null 2>&1 || true
          if ! git rev-parse "origin/${BASE_REF}" >/dev/null 2>&1; then
            echo "::notice::base ref origin/${BASE_REF} unavailable — skipping move-together (first introduction?)."
            exit 0
          fi
          git worktree add -f /tmp/base-tree "origin/${BASE_REF}" >/dev/null
          # If the prod overlay does not exist on the base ref yet, skip.
          if [ ! -d /tmp/base-tree/k8s/overlays/prod ]; then
            echo "::notice::prod overlay absent on base ref — skipping move-together."
            git worktree remove --force /tmp/base-tree; exit 0
          fi
          digest() { # $1 = rendered file, $2 = rollout name
            yq ea "select(.kind==\"Rollout\" and .metadata.name==\"$2\") | .spec.template.spec.containers[0].image" "$1"
          }
          kustomize build /tmp/base-tree/k8s/overlays/prod > /tmp/prod-base.yaml
          GW_HEAD="$(digest rendered-prod.yaml aegis-core-gateway)"
          EN_HEAD="$(digest rendered-prod.yaml aegis-core-engine)"
          GW_BASE="$(digest /tmp/prod-base.yaml aegis-core-gateway)"
          EN_BASE="$(digest /tmp/prod-base.yaml aegis-core-engine)"
          git worktree remove --force /tmp/base-tree
          echo "gateway: base=${GW_BASE} head=${GW_HEAD}"
          echo "engine:  base=${EN_BASE} head=${EN_HEAD}"
          gw_changed=false; en_changed=false
          [ "${GW_HEAD}" != "${GW_BASE}" ] && gw_changed=true
          [ "${EN_HEAD}" != "${EN_BASE}" ] && en_changed=true
          if [ "${gw_changed}" != "${en_changed}" ]; then
            echo "::error::prod promotion changed only one image (gateway_changed=${gw_changed}, engine_changed=${en_changed}). ADR-14 requires both digests move together (atomic multi-image promotion)."
            exit 1
          fi
          echo "--- move-together: OK (gateway_changed=${gw_changed}, engine_changed=${en_changed}) ---"
