name: Validate

# Renders both kustomize overlays and enforces the ADR-12 release-model
# contract:
#
#   1. Tag-presence guard — every rendered image line must match
#      `aegis-core:<tag>`. This is the regression test for the
#      ImagePullBackOff trap: without the annotation-driven replacement
#      contract the prod overlay rendered bare `aegis-core` (no tag, no
#      registry prefix) — a guaranteed pull failure in every ECR-backed
#      cluster. The guard catches any revert of the replacement wiring.
#
#   2. Injection simulation — replays what the platform ApplicationSet
#      does at sync time (inject `aegis.binhsu.org/ecr-repository` and
#      `aegis.binhsu.org/region` via `kustomize edit add annotation`
#      WITHOUT --force — exactly as ArgoCD does), then builds and asserts
#      the rendered images carry the ECR prefix before the tag.
#
#      Using the real kustomize edit mechanism (not sed) means CI catches
#      exactly the conflict class that broke ArgoCD on 2026-06-12: if the
#      overlay kustomization file declares a key that ArgoCD tries to
#      inject, this step fails with "annotation already in kustomization
#      file. Use --force to override." — the same error ArgoCD surfaces.
#
#      The IRSA templatePatch axis (ApplicationSet JSON patch that
#      annotates the engine ServiceAccount) is NOT simulated here — it is
#      an ApplicationSet-level JSON patch, not a kustomize transformer,
#      and the ServiceAccount annotation is cosmetic for local rendering.
#
# kustomize v5.8.1 linux/amd64 is downloaded once, sha256-verified, and
# reused across both overlay loops. The pinned kustomize binary is used
# for both the standalone render and the injection simulation so that
# both paths run the identical renderer version.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  kustomize-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install kustomize v5.8.1 (pinned sha256)
        run: |
          set -euo pipefail
          # Download the official release tarball, verify its sha256, then
          # extract the binary. The checksum was recorded from the release's
          # checksums.txt at the time this workflow was authored; it must
          # match exactly — any divergence aborts the job before any code runs.
          KUSTOMIZE_VERSION="v5.8.1"
          KUSTOMIZE_TARBALL="kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          KUSTOMIZE_URL="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/${KUSTOMIZE_TARBALL}"
          KUSTOMIZE_SHA256="029a7f0f4e1932c52a0476cf02a0fd855c0bb85694b82c338fc648dcb53a819d"
          curl -fsSL "${KUSTOMIZE_URL}" -o "/tmp/${KUSTOMIZE_TARBALL}"
          echo "${KUSTOMIZE_SHA256}  /tmp/${KUSTOMIZE_TARBALL}" | sha256sum --check
          tar -xzf "/tmp/${KUSTOMIZE_TARBALL}" -C /usr/local/bin kustomize
          kustomize version

      - name: Render overlays + assert tag-model guard (ImagePullBackOff regression)
        run: |
          set -euo pipefail
          # ADR-12 tag-model contract: every image line in the rendered YAML
          # must be `aegis-core:<tag>`. Without the annotation-driven registry
          # replacement the overlay rendered bare `aegis-core` (no tag, no
          # registry prefix) — a guaranteed ImagePullBackOff. The guard catches
          # any future revert of the replacements wiring before it reaches the
          # cluster.
          #
          # Three image-bearing resources per overlay:
          #   - aegis-core-gateway Rollout, container `gateway`  (tag: staging-<sha>)
          #   - aegis-core-engine  Rollout, container `engine`   (tag: engine-staging-<sha>)
          #   - aegis-core-engine-seed Job, container `seed`     (tag: engine-staging-<sha>)
          for overlay in staging prod; do
            echo "=== k8s/overlays/${overlay} (standalone) ==="
            kustomize build "k8s/overlays/${overlay}" > "rendered-${overlay}.yaml"
            image_lines="$(grep -E '^\s+image: ' "rendered-${overlay}.yaml")"
            echo "${image_lines}"
            # Every image line must match aegis-core:<tag> — no bare name,
            # no accidental registry leakage into the public base manifests.
            bad="$(echo "${image_lines}" | grep -Ev '^[[:space:]]*image: aegis-core:[^[:space:]]+$' || true)"
            [ -z "${bad}" ] \
              || { echo "::error::${overlay}: image line(s) do not match aegis-core:<tag> (ImagePullBackOff regression? replacements wiring missing?):"; echo "${bad}"; exit 1; }
            echo "--- guard: OK ---"
          done

      - name: Simulate platform annotation injection + assert ECR prefix
        run: |
          set -euo pipefail
          # Replay the ArgoCD-side injection using the REAL kustomize mechanism:
          # `kustomize edit add annotation <k:v>` WITHOUT --force — exactly as
          # ArgoCD's ApplicationSet runs it. If an overlay kustomization file
          # still declares these keys, this step fails with "annotation already
          # in kustomization file. Use --force to override." — the same error
          # ArgoCD surfaces — catching the conflict before it reaches the cluster.
          #
          # ECR_REPO is the full repository URL (NO tag). The replacements block
          # splices this value as the registry prefix (part before `:`) into each
          # container image field, leaving the CI-managed tag intact.
          REGION="eu-central-1"
          ECR_REPO="251774439261.dkr.ecr.${REGION}.amazonaws.com/aegis-core"
          for overlay in staging prod; do
            echo "=== k8s/overlays/${overlay} (injected) ==="
            rm -rf /tmp/inject-sim
            cp -r k8s /tmp/inject-sim
            # Run kustomize edit add annotation (no --force) in the overlay dir,
            # exactly as ArgoCD does. This fails if the keys are already present
            # in the kustomization file — which is the regression we guard here.
            (
              cd "/tmp/inject-sim/overlays/${overlay}"
              kustomize edit add annotation \
                "aegis.binhsu.org/ecr-repository:${ECR_REPO}" \
                "aegis.binhsu.org/region:${REGION}"
            )
            kustomize build "/tmp/inject-sim/overlays/${overlay}" > "rendered-${overlay}-injected.yaml"
            image_lines="$(grep -E '^\s+image: ' "rendered-${overlay}-injected.yaml")"
            echo "${image_lines}"
            # Every image line must carry the ECR registry prefix before the tag.
            # A bare `aegis-core:<tag>` (without registry host) would
            # ImagePullBackOff in any ECR-backed cluster.
            bad="$(echo "${image_lines}" | grep -Ev "^[[:space:]]*image: ${ECR_REPO}:[^[:space:]]+\$" || true)"
            [ -z "${bad}" ] \
              || { echo "::error::${overlay}: injected render has image line(s) without ECR prefix ${ECR_REPO}:"; echo "${bad}"; exit 1; }
            echo "--- injection guard: OK ---"
          done
