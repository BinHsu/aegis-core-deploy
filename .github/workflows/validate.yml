name: Validate

# Renders the kustomize overlays and enforces the ADR-10/14 release-model
# contract (migrated from the ADR-12 tag model in WS1):
#
#   A. Digest-presence guard — every rendered image line must be
#      `aegis-core@sha256:<64-hex>`. Catches a revert of the digest pins or
#      the replacements wiring (either would render bare `aegis-core` /
#      `:latest` — a guaranteed ImagePullBackOff).
#
#   B. Injection simulation — replays what the platform ApplicationSet does
#      (inject `aegis.binhsu.org/ecr-repository` + `aegis.binhsu.org/region`
#      via `kustomize edit add annotation` WITHOUT --force, exactly as ArgoCD
#      does), then asserts the registry is spliced IN FRONT of the @sha256
#      digest (delimiter `@`, digest preserved). Using the real kustomize edit
#      mechanism catches the "annotation already in kustomization file" conflict
#      class that broke ArgoCD on 2026-06-12.
#
#   C. seed==engine guard (ADR-14) — the engine seed Job must carry the SAME
#      digest as the engine Rollout. Divergence is a bug.
#
#   D. Move-together guard (ADR-14, prod, PRs only) — a prod-overlay PR must
#      change BOTH the gateway and engine digests or NEITHER. A PR bumping one
#      and leaving the other stale fails. (Atomic multi-image promotion.)
#
# Three overlays are validated: staging, prod (EKS, include components/aws-binding)
# and talos (on-prem, Gateway API). kustomize v5.8.1 is pinned + sha256-verified.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  kustomize-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Need history for the move-together base-ref render (guard D).
          fetch-depth: 0

      - name: Install kustomize v5.8.1 (pinned sha256)
        run: |
          set -euo pipefail
          KUSTOMIZE_VERSION="v5.8.1"
          KUSTOMIZE_TARBALL="kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          KUSTOMIZE_URL="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/${KUSTOMIZE_TARBALL}"
          KUSTOMIZE_SHA256="029a7f0f4e1932c52a0476cf02a0fd855c0bb85694b82c338fc648dcb53a819d"
          curl -fsSL "${KUSTOMIZE_URL}" -o "/tmp/${KUSTOMIZE_TARBALL}"
          echo "${KUSTOMIZE_SHA256}  /tmp/${KUSTOMIZE_TARBALL}" | sha256sum --check
          tar -xzf "/tmp/${KUSTOMIZE_TARBALL}" -C /usr/local/bin kustomize
          kustomize version

      - name: A. Digest-presence guard (ImagePullBackOff regression)
        run: |
          set -euo pipefail
          # ADR-10/14 digest model: every image line must be
          # `aegis-core@sha256:<64-hex>`. Bare name / tag / :latest => fail.
          for overlay in staging prod talos; do
            echo "=== k8s/overlays/${overlay} (standalone) ==="
            kustomize build "k8s/overlays/${overlay}" > "rendered-${overlay}.yaml"
            image_lines="$(grep -E '^\s+image: ' "rendered-${overlay}.yaml")"
            echo "${image_lines}"
            bad="$(echo "${image_lines}" | grep -Ev '^[[:space:]]*image: aegis-core@sha256:[0-9a-f]{64}$' || true)"
            [ -z "${bad}" ] \
              || { echo "::error::${overlay}: image line(s) not pinned as aegis-core@sha256:<64-hex> (digest pin or replacements wiring missing?):"; echo "${bad}"; exit 1; }
            echo "--- digest-presence: OK ---"
          done

      - name: B. Injection simulation — assert registry splices before @digest
        run: |
          set -euo pipefail
          REGION="eu-central-1"
          TEST_REPO="251774439261.dkr.ecr.${REGION}.amazonaws.com/aegis-core"
          for overlay in staging prod talos; do
            echo "=== k8s/overlays/${overlay} (injected) ==="
            rm -rf /tmp/inject-sim
            cp -r k8s /tmp/inject-sim
            ( cd "/tmp/inject-sim/overlays/${overlay}"
              kustomize edit add annotation \
                "aegis.binhsu.org/ecr-repository:${TEST_REPO}" \
                "aegis.binhsu.org/region:${REGION}" )
            kustomize build "/tmp/inject-sim/overlays/${overlay}" > "rendered-${overlay}-injected.yaml"
            image_lines="$(grep -E '^\s+image: ' "rendered-${overlay}-injected.yaml")"
            echo "${image_lines}"
            # Registry prefix in front, @sha256 digest preserved.
            bad="$(echo "${image_lines}" | grep -Ev "^[[:space:]]*image: ${TEST_REPO}@sha256:[0-9a-f]{64}\$" || true)"
            [ -z "${bad}" ] \
              || { echo "::error::${overlay}: injected image(s) not ${TEST_REPO}@sha256:<digest> (delimiter/index regression?):"; echo "${bad}"; exit 1; }
            echo "--- injection: OK ---"
          done

      - name: C. seed==engine digest guard (ADR-14)
        run: |
          set -euo pipefail
          # yq is preinstalled on ubuntu-latest. Compare the engine Rollout's
          # image to the engine seed Job's image in each rendered overlay.
          for overlay in staging prod talos; do
            engine="$(yq ea 'select(.kind=="Rollout" and .metadata.name=="aegis-core-engine") | .spec.template.spec.containers[0].image' "rendered-${overlay}.yaml")"
            seed="$(yq ea 'select(.kind=="Job" and .metadata.name=="aegis-core-engine-seed") | .spec.template.spec.containers[0].image' "rendered-${overlay}.yaml")"
            echo "${overlay}: engine=${engine} seed=${seed}"
            [ "${engine}" = "${seed}" ] \
              || { echo "::error::${overlay}: seed Job image (${seed}) != engine Rollout image (${engine}) — ADR-14 seed==engine violated."; exit 1; }
            echo "--- seed==engine: OK ---"
          done

      - name: D. Move-together guard — prod gateway+engine digests (ADR-14, PRs)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # A prod promotion PR must change BOTH digests or NEITHER. Render the
          # prod overlay at the PR head and at the base ref, then compare.
          BASE_REF="${{ github.base_ref }}"
          git fetch --no-tags origin "${BASE_REF}" >/dev/null 2>&1 || true
          if ! git rev-parse "origin/${BASE_REF}" >/dev/null 2>&1; then
            echo "::notice::base ref origin/${BASE_REF} unavailable — skipping move-together (first introduction?)."
            exit 0
          fi
          git worktree add -f /tmp/base-tree "origin/${BASE_REF}" >/dev/null
          # If the prod overlay does not exist on the base ref yet, skip.
          if [ ! -d /tmp/base-tree/k8s/overlays/prod ]; then
            echo "::notice::prod overlay absent on base ref — skipping move-together."
            git worktree remove --force /tmp/base-tree; exit 0
          fi
          digest() { # $1 = rendered file, $2 = rollout name
            yq ea "select(.kind==\"Rollout\" and .metadata.name==\"$2\") | .spec.template.spec.containers[0].image" "$1"
          }
          kustomize build /tmp/base-tree/k8s/overlays/prod > /tmp/prod-base.yaml
          GW_HEAD="$(digest rendered-prod.yaml aegis-core-gateway)"
          EN_HEAD="$(digest rendered-prod.yaml aegis-core-engine)"
          GW_BASE="$(digest /tmp/prod-base.yaml aegis-core-gateway)"
          EN_BASE="$(digest /tmp/prod-base.yaml aegis-core-engine)"
          git worktree remove --force /tmp/base-tree
          echo "gateway: base=${GW_BASE} head=${GW_HEAD}"
          echo "engine:  base=${EN_BASE} head=${EN_HEAD}"
          gw_changed=false; en_changed=false
          [ "${GW_HEAD}" != "${GW_BASE}" ] && gw_changed=true
          [ "${EN_HEAD}" != "${EN_BASE}" ] && en_changed=true
          if [ "${gw_changed}" != "${en_changed}" ]; then
            echo "::error::prod promotion changed only one image (gateway_changed=${gw_changed}, engine_changed=${en_changed}). ADR-14 requires both digests move together (atomic multi-image promotion)."
            exit 1
          fi
          echo "--- move-together: OK (gateway_changed=${gw_changed}, engine_changed=${en_changed}) ---"
