name: Bug report
description: Something is broken in the manifests or CI pipeline
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the sections below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the unexpected behaviour.
      placeholder: "ArgoCD sync failed with error …"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "Kubernetes version, ArgoCD version, overlay (staging / prod)"
      placeholder: "k8s 1.31, ArgoCD 2.12, overlay: staging"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
