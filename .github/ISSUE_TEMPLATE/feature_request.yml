name: Feature request
description: Suggest an improvement to the manifests, overlays, or CI pipeline
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the improvement you have in mind.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why is the current state insufficient?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What change would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you evaluated.
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
