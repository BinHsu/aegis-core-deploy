apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aegis-core-gateway
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: aegis-core-gateway
    app.kubernetes.io/part-of: aegis-core
spec:
  # Gateway API replaces the AWS-ALB Ingress (which lives in
  # components/aws-binding, not in this overlay) on the Talos target. Only the
  # gateway is exposed; the engine is an internal gRPC service with no ingress.
  parentRefs:
    - name: aegis-gw
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - aegis-core.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: aegis-core-gateway
          port: 8080
