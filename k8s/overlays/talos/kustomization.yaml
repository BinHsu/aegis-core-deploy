apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Talos / on-prem overlay (WS1). The neutral base + a Gateway API HTTPRoute.
# Because the base is already provider-neutral (WS1-1 moved the ALB Ingress,
# ServiceMonitors, and WorkloadIdentity XR to components/aws-binding), this
# overlay is purely ADDITIVE — no $patch: delete needed, unlike greeter's
# talos overlay whose base still carried an ALB Ingress.
#
# It does NOT include components/aws-binding, so on this target there is:
#   - no ALB Ingress         -> a Gateway API HTTPRoute (httproute.yaml) instead
#   - no ServiceMonitor      -> on-prem metrics via Alloy/OTel is WS2-DEFERRED
#   - no WorkloadIdentity XR  -> the engine's identity substitute is SPIFFE/SPIRE
#                               (WS2-3, live-verified — see onprem-binding).
#
# It DOES include components/onprem-binding, which now carries two WS2 axes:
#   - WS2-2 (ADR-18) OBJECT STORE: MinIO substitutes the AWS S3 model bucket;
#     an init-container mirrors it into the engine's /models CAS store.
#   - WS2-3 IDENTITY: SPIRE issues JWT-SVIDs; the engine exchanges them at
#     MinIO STS (AssumeRoleWithWebIdentity) for scoped temp creds — the on-prem
#     IRSA mirror, replacing WS2-2's static root credential. Live-verified on
#     local Talos 2026-06-16 (L1 attest -> model-in-/models).
# Gateway auth (Cognito -> Dex) and the in-cluster nginx frontend remain
# on-prem-fidelity carry-forward, off the WS3 AWS critical path (WS3 uses the
# real Cognito / CloudFront).
components:
  - ../../components/onprem-binding
#
# The platform injects the target registry as `aegis.binhsu.org/ecr-repository`
# (here a LOCAL registry, not ECR) via the ArgoCD Application's
# commonAnnotations; the replacements below splice it in front of the
# digest-pinned images.
#
# Talos KEEPS the registry-injection mechanism. The ghcr-graviton pivot removed
# it ONLY for the AWS overlays (staging/prod now carry a static public GHCR ref
# and need no injection). On-prem still splices a per-target LOCAL registry at
# sync time, so the `aegis.binhsu.org/ecr-repository` annotation that the AWS
# pivot dropped from the base is RE-ADDED here, scoped to this overlay (the
# annotation patches in the `patches` block below), leaving the replacements
# source intact. Talos's own bare `aegis-core@sha256:<digest>` image patches
# OVERRIDE the base's full GHCR refs, so the in-cluster registry splice (and
# overlays/talos-standalone's `images: aegis-core` rewrite) still resolves the
# single-repo on-prem model.
#
# TODO(ghcr-graviton): talos local-registry path needs follow-up — the WS2
# digests below are the OLD locally-built amd64 images; once the arm64 GHCR
# build lands, decide whether on-prem mirrors from GHCR (crane copy, digest
# preserved) or keeps a separate local build.
resources:
  - ../../base
  - httproute.yaml

# Lean local footprint: 1 replica each (mirrors staging).
patches:
  # Re-add the `aegis.binhsu.org/ecr-repository` annotation, scoped to this
  # on-prem overlay (the AWS pivot dropped it from the base). The replacements
  # block below sources from it to splice the platform-injected LOCAL registry
  # in front of each bare `aegis-core@sha256:<digest>` image. Standalone build
  # uses the literal `aegis-core` here (overlays/talos-standalone rewrites it).
  - patch: |-
      - op: add
        path: /metadata/annotations/aegis.binhsu.org~1ecr-repository
        value: aegis-core
    target:
      kind: Rollout
      name: aegis-core-gateway
  - patch: |-
      - op: add
        path: /metadata/annotations/aegis.binhsu.org~1ecr-repository
        value: aegis-core
    target:
      kind: Rollout
      name: aegis-core-engine
  - patch: |-
      - op: add
        path: /metadata/annotations/aegis.binhsu.org~1ecr-repository
        value: aegis-core
    target:
      kind: Job
      name: aegis-core-engine-seed
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Rollout
      name: aegis-core-gateway
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Rollout
      name: aegis-core-engine
  # --- digest pins (aegis-core release-onprem-image.yml -> GHCR).
  #   gateway: WS2-1 build (Go, distroless_static — runs fine).
  #   engine + seed: WS2-2 build that made the engine actually RUNNABLE
  #     (distroless_cc/debian13 + bundled manifest + GGML_NATIVE=OFF; the
  #     WS2-1 engine image built but SIGILLed/failed to exec — see ADR-18 and
  #     aegis-core#147). engine boot verified on local Talos: CAS preflight
  #     passes against the MinIO-delivered model, gRPC :50051 up.
  # The digest identifies image content, so it holds whether served from GHCR
  # or the in-cluster registry the platform injects in front of it (crane copy
  # preserves the digest). seed Job == engine digest (ADR-14).
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: aegis-core@sha256:e7d514503775729328e56be3eeea989535e2f666e4299f13374d7c293fb8ba5b
    target:
      kind: Rollout
      name: aegis-core-gateway
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: aegis-core@sha256:551744a9e9d9861c8f27964af1493026f871bca8431d6e04d3fb15763a8f7c05
    target:
      kind: Rollout
      name: aegis-core-engine
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: aegis-core@sha256:551744a9e9d9861c8f27964af1493026f871bca8431d6e04d3fb15763a8f7c05
    target:
      kind: Job
      name: aegis-core-engine-seed

# Registry injection — identical mechanism to staging/prod (delimiter `@`,
# splice the platform-injected registry in front of the digest). Only the
# injected VALUE differs per target: a local registry here, ECR there.
replacements:
  - source:
      kind: Rollout
      name: aegis-core-gateway
      fieldPath: metadata.annotations.[aegis.binhsu.org/ecr-repository]
    targets:
      - select:
          kind: Rollout
          name: aegis-core-gateway
        fieldPaths:
          - spec.template.spec.containers.[name=gateway].image
        options:
          delimiter: "@"
          index: 0
  - source:
      kind: Rollout
      name: aegis-core-engine
      fieldPath: metadata.annotations.[aegis.binhsu.org/ecr-repository]
    targets:
      - select:
          kind: Rollout
          name: aegis-core-engine
        fieldPaths:
          - spec.template.spec.containers.[name=engine].image
        options:
          delimiter: "@"
          index: 0
  - source:
      kind: Job
      name: aegis-core-engine-seed
      fieldPath: metadata.annotations.[aegis.binhsu.org/ecr-repository]
    targets:
      - select:
          kind: Job
          name: aegis-core-engine-seed
        fieldPaths:
          - spec.template.spec.containers.[name=seed].image
        options:
          delimiter: "@"
          index: 0
