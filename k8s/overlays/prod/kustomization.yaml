apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Prod overlay — what ArgoCD's Application CR points at
# (k8s/overlays/prod). ArgoCD renders this kustomization and syncs
# the result into the `aegis-core` namespace.
resources:
  - ../../base
# Image — single ECR repo, tag-prefix model (ldz #79).
#
# All three image-bearing manifests (gateway rollout, engine rollout,
# engine seed-job) share ONE ECR repository, `aegis-core`. They are
# distinguished only by tag PREFIX:
#
#   - gateway          → tag `staging-<git_sha>`
#   - engine + seed    → tag `engine-staging-<git_sha>`
#
# `newName` below de-hardcodes the registry path: it lifts the full
# ECR URL (with the AWS account ID) out of the three base manifests
# and into this one overlay location. The base manifests now carry
# only the bare `aegis-core:<tag>` reference.
#
# Why NO `newTag` here: kustomize can carry only ONE `newTag` per
# `name` match key, but gateway and engine need DIFFERENT tag
# prefixes off the same `name: aegis-core`. So the tags stay in the
# base rollout / seed-job manifests, where aegis-core CI rewrites
# them per-manifest (ADR-0032 `bump-image-tag` job). `newName` has
# no such single-value limit — it applies the same registry path to
# every `aegis-core:*` image regardless of tag.
#
# The account ID embedded in `newName` is an accepted, documented
# leak — same posture as the sibling aegis-greeter_deploy repo's
# committed image manifest.
images:
  - name: aegis-core
    newName: 251774439261.dkr.ecr.eu-central-1.amazonaws.com/aegis-core
