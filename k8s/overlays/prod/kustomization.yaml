apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Prod overlay — what ArgoCD's Application CR points at
# (k8s/overlays/prod). ArgoCD renders this kustomization and syncs
# the result into the `aegis-core` namespace.
resources:
  - ../../base

# AWS binding (WS1) — re-adds the ALB Ingress + the engine model-fetch/Cognito
# wiring. (ServiceMonitors removed in WS3 — the platform is Alloy-native; no
# prometheus-operator CRD. ADR-21 §A removed the WorkloadIdentity XR — engine IAM
# is now EKS Pod Identity owned by the platform Terraform.) staging/prod are EKS
# targets; the Talos overlay omits this component.
components:
  - ../../components/aws-binding

# Image refs (ghcr-graviton pivot) — replaces the ADR-12 ECR annotation+splice.
#
# The three image-bearing manifests now resolve from PUBLIC GHCR, one package
# per image name (GHCR is one-package-per-name):
#   gateway -> ghcr.io/binhsu/aegis-core-gateway
#   engine  -> ghcr.io/binhsu/aegis-core-engine
#   seed    -> ghcr.io/binhsu/aegis-core-engine  (ADR-14: same image+digest as engine)
#
# GHCR refs are STATIC — no account-id / region in the URL, unlike ECR. So the
# platform no longer needs to inject the registry for aegis-core. The chosen
# mechanism is DEPLOY-OWNS-STATIC-GHCR: the base resources carry the full GHCR
# ref, and each overlay pins the digest via the JSON6902 patch FILES below.
# The old platform-injection indirection (the `aegis.binhsu.org/ecr-repository`
# annotation + the `replacements` that spliced it before the `@` digest
# delimiter) is REMOVED. Only the region replacement (external-dns latency
# routing) remains.
#
# Why NOT kustomize.images newName: the workloads are Argo Rollout CRDs +
# a Job; kustomize's images: transformer doesn't reach a CRD, so the full ref
# is carried in the base image field and the digest pinned by JSON6902 patch.
replacements:
  # external-dns latency routing (WS3-R): rewrite the gateway Ingress's
  # set-identifier + aws-region placeholders with the platform-injected region
  # (aegis.binhsu.org/region, on the gateway Rollout). Mirrors greeter. Standalone
  # build uses the base literal "local".
  - source:
      kind: Rollout
      name: aegis-core-gateway
      fieldPath: metadata.annotations.[aegis.binhsu.org/region]
    targets:
      - select:
          kind: Ingress
          name: aegis-core-gateway
        fieldPaths:
          - metadata.annotations.[external-dns.alpha.kubernetes.io/set-identifier]
          - metadata.annotations.[external-dns.alpha.kubernetes.io/aws-region]

# Digest pins (ADR-10/14). Same mechanism + rationale as the staging overlay:
# per-resource JSON6902 patches (Rollout CRDs + a Job), each carrying the FULL
# public GHCR ref (ghcr-graviton pivot); seed Job == engine ref+digest (ADR-14).
# Prod's digests are PROMOTED from staging by a promotion PR that copies the
# staging-verified digests here in one commit (ADR-14 atomic promotion).
patches:
  # Prod hostname (WS3-R). The aws-binding component ships the staging host as
  # default; prod serves on its per-env subdomain aegis-api.prod.aws.binhsu.org.
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: aegis-api.prod.aws.binhsu.org
    target:
      kind: Ingress
      name: aegis-core-gateway
  # --- digest pins (JSON6902 patch FILES, ADR-10/14) ---
  # In files (not inline) so the promotion PR bumps them mechanically via yq,
  # gateway + engine + seed in one atomic commit (ADR-14). Base stays neutral.
  - path: digest-gateway.yaml
    target:
      kind: Rollout
      name: aegis-core-gateway
  - path: digest-engine.yaml
    target:
      kind: Rollout
      name: aegis-core-engine
  - path: digest-seed.yaml
    target:
      kind: Job
      name: aegis-core-engine-seed
