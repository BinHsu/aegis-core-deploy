apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Prod overlay — what ArgoCD's Application CR points at
# (k8s/overlays/prod). ArgoCD renders this kustomization and syncs
# the result into the `aegis-core` namespace.
resources:
  - ../../base
# Image — single ECR repo, tag-prefix model (ldz #79).
#
# All three image-bearing manifests (gateway rollout, engine rollout,
# engine seed-job) share ONE ECR repository, `aegis-core`, distinguished only
# by tag PREFIX (gateway → `staging-<sha>`, engine + seed →
# `engine-staging-<sha>`). Those tags stay in the base rollout / seed-job
# manifests, where aegis-core CI rewrites them per-manifest (ADR-0032).
#
# `newName` (the ECR registry URL — it embeds the AWS account ID) is GONE.
# The platform ApplicationSet now injects it via kustomize.images at sync time
# (aegis-platform ADR-07 / account-ID hide) — newName only, applied to every
# `aegis-core:*` image regardless of tag, exactly as this block used to. So the
# account ID never lands in this public repo; the base manifests carry only the
# bare `aegis-core:<tag>` reference.
#
# ⚠️ implemented, E2E PENDING platform bootstrap — confirm the injected newName
# resolves all three images at first sync.
