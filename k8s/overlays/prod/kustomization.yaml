apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Prod overlay — what ArgoCD's Application CR points at
# (k8s/overlays/prod). ArgoCD renders this kustomization and syncs
# the result into the `aegis-core` namespace.
resources:
  - ../../base

# AWS binding (WS1) — re-adds the ALB Ingress, ServiceMonitors, and the
# WorkloadIdentity XR that moved off the neutral base. staging/prod are EKS
# targets; the Talos overlay omits this component.
components:
  - ../../components/aws-binding

# Registry injection (ADR-12) — annotation-driven, not kustomize.images.
#
# All three image-bearing manifests (gateway Rollout, engine Rollout,
# engine seed-job) share ONE ECR repository, `aegis-core`, distinguished
# by tag PREFIX (gateway: `staging-<sha>`, engine + seed:
# `engine-staging-<sha>`). Those tags stay in the base manifests, where
# aegis-core CI rewrites them per-manifest (ADR-0032).
#
# The platform ApplicationSet injects the full ECR repository URL (NO
# tag) as `aegis.binhsu.org/ecr-repository: <acct>.dkr.ecr.<region>.amazonaws.com/aegis-core`
# via kustomize.commonAnnotations at sync time. The `replacements` block
# below splices that URL as the part of each image field BEFORE the `:`,
# so the CI-managed tag survives unchanged. Standalone `kustomize build`
# falls back to the base literal (`aegis-core`) — the short form is
# valid for local development; ECR resolution only happens in-cluster
# via the injected full URL.
#
# Why NOT kustomize.images newName: the platform's `spec.source.kustomize.images`
# newName-only injection was proven to overwrite the tag field on kustomize
# v5.8.1, rendering `:latest` (ImagePullBackOff trap). Annotations +
# replacements is the ADR-12 contract: the platform owns the registry URL
# channel; the deploy repo owns the tag.
#
# Standalone-build defaults for `aegis.binhsu.org/ecr-repository` are
# declared as LITERAL annotations on the base resources (NOT here in
# commonAnnotations). ArgoCD's injection runs
# `kustomize edit add annotation <k:v>` WITHOUT --force; that command
# refuses keys already present in the kustomization file. Keeping this
# file annotation-free means ArgoCD's edit-add-annotation succeeds, and
# the commonAnnotations transformer then overrides the base literals with
# the real injected values at sync time.
#
# ⚠️ E2E PENDING platform bootstrap — confirm the injected registry
# prefix resolves all three images at first sync.
replacements:
  # external-dns latency routing (WS3-R): rewrite the gateway Ingress's
  # set-identifier + aws-region placeholders with the platform-injected region
  # (aegis.binhsu.org/region, on the gateway Rollout). Mirrors greeter. Standalone
  # build uses the base literal "local".
  - source:
      kind: Rollout
      name: aegis-core-gateway
      fieldPath: metadata.annotations.[aegis.binhsu.org/region]
    targets:
      - select:
          kind: Ingress
          name: aegis-core-gateway
        fieldPaths:
          - metadata.annotations.[external-dns.alpha.kubernetes.io/set-identifier]
          - metadata.annotations.[external-dns.alpha.kubernetes.io/aws-region]
  # Gateway Rollout — container name: gateway
  - source:
      kind: Rollout
      name: aegis-core-gateway
      fieldPath: metadata.annotations.[aegis.binhsu.org/ecr-repository]
    targets:
      - select:
          kind: Rollout
          name: aegis-core-gateway
        fieldPaths:
          - spec.template.spec.containers.[name=gateway].image
        options:
          # `@` delimiter (ADR-10/14): registry spliced in front of the
          # digest-pinned image, preserving the @sha256 digest from the
          # JSON6902 patches below. (Was `:` in the pre-digest model.)
          delimiter: "@"
          index: 0
  # Engine Rollout — container name: engine
  - source:
      kind: Rollout
      name: aegis-core-engine
      fieldPath: metadata.annotations.[aegis.binhsu.org/ecr-repository]
    targets:
      - select:
          kind: Rollout
          name: aegis-core-engine
        fieldPaths:
          - spec.template.spec.containers.[name=engine].image
        options:
          # `@` delimiter (ADR-10/14): registry spliced in front of the
          # digest-pinned image, preserving the @sha256 digest from the
          # JSON6902 patches below. (Was `:` in the pre-digest model.)
          delimiter: "@"
          index: 0
  # Engine seed Job — container name: seed
  - source:
      kind: Job
      name: aegis-core-engine-seed
      fieldPath: metadata.annotations.[aegis.binhsu.org/ecr-repository]
    targets:
      - select:
          kind: Job
          name: aegis-core-engine-seed
        fieldPaths:
          - spec.template.spec.containers.[name=seed].image
        options:
          # `@` delimiter (ADR-10/14): registry spliced in front of the
          # digest-pinned image, preserving the @sha256 digest from the
          # JSON6902 patches below. (Was `:` in the pre-digest model.)
          delimiter: "@"
          index: 0

# Digest pins (ADR-10/14). Same mechanism + rationale as the staging overlay:
# per-resource JSON6902 patches (Rollout CRDs sharing the name `aegis-core`),
# seed Job == engine digest (ADR-14). Prod's digests are PROMOTED from staging
# by a promotion PR that copies the staging-verified digests here in one commit
# (ADR-14 atomic promotion). Placeholders until the WS3 ECR pipeline + promotion
# flow set them — see staging overlay note on the WS3-deferred CI bump.
patches:
  # Prod hostname (WS3, ADR-19). The aws-binding component ships the staging
  # host as its default; prod serves on the apex sub-domain aegis-api.binhsu.org.
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: aegis-api.binhsu.org
    target:
      kind: Ingress
      name: aegis-core-gateway
  # --- digest pins (JSON6902 patch FILES, ADR-10/14) ---
  # In files (not inline) so the promotion PR bumps them mechanically via yq,
  # gateway + engine + seed in one atomic commit (ADR-14). Base stays neutral.
  - path: digest-gateway.yaml
    target:
      kind: Rollout
      name: aegis-core-gateway
  - path: digest-engine.yaml
    target:
      kind: Rollout
      name: aegis-core-engine
  - path: digest-seed.yaml
    target:
      kind: Job
      name: aegis-core-engine-seed
