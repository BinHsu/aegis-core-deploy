# Gateway digest pin (ADR-10/14 "build once, promote by digest"). JSON6902
# patch FILE (not inline) so the aegis-core release CI can mechanically set the
# value via `yq -i '.[0].value = "ghcr.io/binhsu/aegis-core-gateway@sha256:<digest>"'`
# after each push. The deploy repo carries the FULL static public GHCR ref
# (ghcr-graviton pivot) — no platform registry injection. validate.yml enforces
# the @sha256 SHAPE.
- op: replace
  path: /spec/template/spec/containers/0/image
  value: ghcr.io/binhsu/aegis-core-gateway@sha256:3bb952306089b92cbd97eb6e6148d2b9e0daad4f4e4ebe2138edb97f9a5e2d36
