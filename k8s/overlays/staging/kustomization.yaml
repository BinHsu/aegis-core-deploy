apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Staging overlay — the first stop in the promotion path (ADR-12). The
# aegis-core CI bumps the image tags in the base manifests on every
# release build; the platform ApplicationSet renders this overlay into
# the aegis-staging cluster. Once verified here, a promotion path
# copies the same artifact reference into overlays/prod. ArgoCD
# reconciles each overlay independently.
resources:
  - ../../base

# AWS binding (WS1) — re-adds the ALB Ingress + the engine model-fetch/Cognito
# wiring. (ServiceMonitors were dropped: the platform is Alloy-native and installs
# no prometheus-operator CRD, so they were inert and blocked the ArgoCD sync. The
# WorkloadIdentity XR was removed in ADR-21 §A — engine IAM is now EKS Pod Identity
# owned by the platform Terraform.) staging/prod are EKS targets; the Talos overlay
# omits this component.
components:
  - ../../components/aws-binding

# Image refs (ghcr-graviton pivot) — identical channel as prod. The base
# resources now carry the FULL static public GHCR ref
# (ghcr.io/binhsu/aegis-core-{gateway,engine}); each digest is pinned by the
# JSON6902 patch FILES below. GHCR refs are static (no account-id / region), so
# the platform no longer injects a registry for aegis-core — the old
# `aegis.binhsu.org/ecr-repository` annotation + image `replacements` splice are
# REMOVED. Only the region replacement (external-dns latency routing) remains.
replacements:
  # external-dns latency routing (WS3-R): rewrite the gateway Ingress's
  # set-identifier + aws-region placeholders with the platform-injected region
  # (aegis.binhsu.org/region, on the gateway Rollout). Mirrors greeter. Standalone
  # build uses the base literal "local".
  - source:
      kind: Rollout
      name: aegis-core-gateway
      fieldPath: metadata.annotations.[aegis.binhsu.org/region]
    targets:
      - select:
          kind: Ingress
          name: aegis-core-gateway
        fieldPaths:
          - metadata.annotations.[external-dns.alpha.kubernetes.io/set-identifier]
          - metadata.annotations.[external-dns.alpha.kubernetes.io/aws-region]

# Env-diff lives in the overlay (ADR-12). Staging runs a leaner footprint
# than prod: 1 replica on each Rollout instead of the base floor of 2.
# The deliberate difference proves the image is identical across envs
# and only config changes between them.
# Digest pins (ADR-10/14 "build once, promote by digest"). Per-resource
# JSON6902 patches because the workloads are Argo Rollout CRDs (kustomize's
# images: transformer doesn't reach a CRD). The gateway and engine now resolve
# to DISTINCT public GHCR repos (aegis-core-gateway vs aegis-core-engine), each
# with its own digest. The seed Job MUST carry the SAME ref+digest as the engine
# Rollout (ADR-14). The patch FILES below carry the FULL GHCR ref + digest; the
# aegis-core release CI bumps them via yq after each GHCR push (ghcr-graviton
# pivot). validate.yml enforces the @sha256 SHAPE + the GHCR ref.
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Rollout
      name: aegis-core-gateway
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Rollout
      name: aegis-core-engine
  # --- digest pins (JSON6902 patch FILES, ADR-10/14) ---
  # In files (not inline) so the aegis-core release CI bumps them mechanically
  # via yq after each ECR push (release-staging-image.yml bump-image-tag job).
  # The base image fields stay neutral (`aegis-core`); these patches own the
  # per-env digest.
  - path: digest-gateway.yaml
    target:
      kind: Rollout
      name: aegis-core-gateway
  - path: digest-engine.yaml
    target:
      kind: Rollout
      name: aegis-core-engine
  - path: digest-seed.yaml
    target:
      kind: Job
      name: aegis-core-engine-seed
