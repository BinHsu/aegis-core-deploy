apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: aegis-core-engine
  namespace: aegis-core
  annotations:
    # Standalone-build defaults for the platform-injected annotations.
    # These live on the BASE resource (not overlay commonAnnotations) because
    # ArgoCD's injection mechanism runs `kustomize edit add annotation <k:v>`
    # WITHOUT --force, which refuses keys already present in the kustomization
    # file ("annotation already in kustomization file. Use --force to
    # override." — caught live 2026-06-12 on aegis-greeter-deploy #6). Placing
    # the defaults here as literal resource annotations instead means the
    # overlay kustomization files declare NO value for these keys — so
    # ArgoCD's edit-add-annotation succeeds, and the commonAnnotations
    # transformer overrides these literals at sync time with the real values
    # injected by the platform ApplicationSet.
    aegis.binhsu.org/ecr-repository: aegis-core
    aegis.binhsu.org/region: local
  labels:
    app.kubernetes.io/name: aegis-core-engine
    app.kubernetes.io/part-of: aegis-core
    app.kubernetes.io/component: inference-engine
# Phase 4c-5a: ADR-0030 Progressive Delivery Controller — engine
# half. Deployment → Rollout conversion matches the gateway; engine
# uses a longer soak (5m vs 2m) because model load at startup takes
# ~30 seconds and a new canary pod needs enough warm-up time for
# health-check stability before the operator commits to promote.
#
# Engine is cluster-internal (no Ingress / ALB), so the ALB
# trafficRouting discussion on the gateway side doesn't apply here —
# canary weight maps cleanly to ReplicaSet replica counts and the
# Service (headless, ADR-0017) round-robins across both ReplicaSets
# naturally. ALB plugin is gateway-only.
#
# AnalysisTemplate SLO gates deferred per ADR-0030 §"Honest phasing"
# — lands alongside Phase 4d metric pipeline (C-5b).
spec:
  # N replicas per ADR-0017 N:N-ready topology. Starting at 2 in
  # staging to exercise the round-robin path end-to-end.
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-core-engine
  strategy:
    canary:
      # 50/50 for 5 minutes — longer than gateway's 2m because engine
      # boot cost includes manifest CAS walk + whisper model mmap
      # + optional bge-m3 load. The pause lets operators confirm the
      # canary ReplicaSet settled into Ready state before promoting.
      steps:
        - setWeight: 50
        - pause:
            duration: 5m
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-core-engine
        app.kubernetes.io/part-of: aegis-core
        app.kubernetes.io/component: inference-engine
    spec:
      serviceAccountName: aegis-core-engine
      # ADR-0006 Graceful Shutdown — 60s for engine because inference
      # workloads may be mid-flight (whisper chunks processing when
      # SIGTERM arrives). Longer than gateway's 30s because server-
      # side drain semantics differ.
      terminationGracePeriodSeconds: 60
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: engine
          # CI-managed tag — rewritten by the `bump-image-tag` job in
          # release-staging-image.yml after each release build
          # (ADR-0032, re-decided 2026-05-17).
          #
          # Neutral default (WS1, ADR-10/14). Real image pinned BY DIGEST per
          # overlay (`aegis-core@sha256:<engine-digest>`, JSON6902 patch);
          # registry spliced by the overlay replacement. The seed Job rides the
          # SAME engine digest (ADR-14). Bare `aegis-core` is the standalone default.
          image: aegis-core
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            # Prometheus pull endpoint — C-Obs-1. Separate port from
            # gRPC keeps mTLS (ADR-0031, C-2) policy evaluation
            # scoped to :50051 only; metrics scrape stays plaintext
            # intra-cluster (monitoring ns is trusted per ldz #54).
            - name: metrics
              containerPort: 8081
              protocol: TCP
          env:
            - name: AEGIS_MODEL_PATH
              # CAS ROOT DIRECTORY, not a file. The engine resolves each
              # required model at <root>/<id>/<sha256>.<ext> and SHA-verifies
              # it at startup (engine_cpp/src/models/manifest_loader.h;
              # AEGIS_MANIFEST_PATH stays at its in-image default
              # models/manifest.json). The prior value pointed at a single
              # file — stale from the pre-CAS engine (ADR-0026 refactor); it
              # made the engine look under /models/ggml-tiny.en.bin/<id>/...
              # On-prem this dir is populated from MinIO by an init-container
              # (components/onprem-binding, ADR-18); on AWS it is the S3+CSI
              # mount (components/aws-binding, delivery deferred).
              value: "/models"
            - name: AEGIS_MANIFEST_PATH
              # The integrity manifest ships in the engine IMAGE (it is
              # versioned with the binary), NOT in the model store. It lives
              # outside /models because the /models volume mount shadows the
              # image's copy. Packaged at this path by packaging/engine/BUILD.bazel.
              value: "/usr/local/share/aegis/models/manifest.json"
            # Qdrant Cloud credentials — Secret materialized by ldz's
            # ExternalSecret `qdrant-credentials` (ldz PR #146, cross-
            # repo contract in ldz #141). Keys are uppercase to match
            # the engine's env-var contract at
            # `engine_cpp/src/vectordb/qdrant_client.cc:132`. The
            # engine's URL parser scheme-infers TLS — the SSM PS
            # value already contains the `https://` prefix + `:6334`
            # (gRPC port), so the Secret is copied verbatim, no
            # ExternalSecret template rewrite needed (ldz #141
            # reply 2026-04-24: "option A" confirmed).
            #
            # Engine fails SOFT when QDRANT_URL is unset — transcript
            # still flows, RAG hints disabled with a "QDRANT_URL unset
            # (RAG hints disabled)" log. That keeps the cold-apply
            # survivable even if the ExternalSecret lags; the first
            # successful reconcile flips retrieval on with a pod
            # restart (secretKeyRef is resolved at container start,
            # not runtime-watched — the ADR-0032 image-tag deferral
            # comment applies here too).
            - name: QDRANT_URL
              valueFrom:
                secretKeyRef:
                  name: qdrant-credentials
                  key: QDRANT_URL
                  # optional so the documented soft-fail above is actually
                  # reachable. Without it, a missing qdrant-credentials Secret
                  # (the ldz ExternalSecret never landed in the WS3 platform-only
                  # bring-up) blocks the POD at CreateContainerConfigError — the
                  # kubelet resolves secretKeyRef before any container starts, so
                  # the engine binary's getenv soft-fail never runs. optional:true
                  # injects nothing when the Secret is absent → QDRANT_URL unset →
                  # RAG disabled, transcript still flows.
                  optional: true
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qdrant-credentials
                  key: QDRANT_API_KEY
                  optional: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            # Engine memory envelope follows ARCH §6 "Engine & Model
            # Quantization": whisper large-v3-turbo Q4 (~1.5GB) +
            # diarization (~1.0GB) + per-session working set. 2Gi
            # request / 4Gi limit covers the basic model set without
            # LLM (ADR-0020 §Memory budget). When LLM toggles on,
            # these bump to request 6Gi / limit 8Gi.
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          # === PROBES DEFERRED ===
          # Engine today (C-1) does NOT register grpc.health.v1.Health.
          # Adding a K8s native grpc probe against a non-existent
          # health service would cause immediate failure-cascade on
          # kubelet probe. Probe wiring lands alongside the ADR-0026
          # engine pre-flight slice (C-2), which introduces the
          # startup manifest validator — that validator is the
          # natural place to also register the gRPC health service
          # once the model load succeeds.
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        # === MODEL STORAGE — BOOTSTRAP PLACEHOLDER ===
        # An emptyDir mount does NOT contain any actual model files;
        # the engine binary will fail startup with "couldn't open
        # file /models/ggml-tiny.en.bin" and crashloop. This is
        # expected for C-1 — the intent is to prove the manifest
        # applies cleanly and ArgoCD syncs; the "make engine
        # actually run" work belongs to:
        #   - ADR-0026 engine pre-flight slice (registers loud,
        #     operator-readable failure before startup)
        #   - C-3 CI-populate-model-storage slice (cross-repo with
        #     ldz #85 for the S3+CSI driver or EFS backing)
        # Until those land, this volume mount is a skeleton for
        # the correct mount-path contract.
        - name: models
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: aegis-core-engine
