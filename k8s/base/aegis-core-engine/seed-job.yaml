apiVersion: batch/v1
kind: Job
metadata:
  name: aegis-core-engine-seed
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: aegis-core-engine-seed
    app.kubernetes.io/part-of: aegis-core
    app.kubernetes.io/component: rag-seed
  annotations:
    # Standalone-build default for the platform-injected region annotation.
    # Mirrors the engine Rollout: ArgoCD's commonAnnotations transformer
    # propagates the injected annotation to ALL resources including this Job.
    #
    # The `aegis.binhsu.org/ecr-repository` annotation is GONE for the AWS
    # overlays (ghcr-graviton pivot): the seed image is a STATIC public GHCR
    # ref carried by the deploy repo — the SAME ref+digest as the engine
    # (ADR-14). The Talos overlay keeps its own copy of the annotation locally.
    aegis.binhsu.org/region: local
    # ArgoCD hook semantics: run AFTER the Rollout (and its Service /
    # NetworkPolicy / ServiceAccount) have reconciled, so the Secret
    # the Job consumes is materialized before it tries to mount.
    argocd.argoproj.io/hook: PostSync
    # `BeforeHookCreation` clears any prior failed Job before
    # creating a new one (useful when iterating on the seed flow).
    # `HookSucceeded` removes successful Jobs to keep the namespace
    # tidy. Failed Jobs persist for operator inspection until the
    # next sync re-creates the hook.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
# Phase 4c (b) — Cloud RAG corpus seed Job per ADR-0023 §Decision B.
# One-shot Job running `engine seed --target=cloud` to populate the
# Qdrant Cloud collection consumed by the engine's RAG retriever
# (`engine_cpp/src/rag/retriever.cc`). Idempotent: `engine seed`
# uses content-hashed UUID point IDs, so re-running is a no-op once
# data is in place (Phase 3b Slice 6 design).
#
# Why `PostSync` hook (not a regular Job): ArgoCD reconciles regular
# Jobs on every Sync, but only re-creates them when the manifest
# diff changes. A `PostSync` hook with the delete policies above
# gives clean re-run semantics keyed on the Sync event itself,
# matching the operational mental model "seed runs after a deploy".
#
# Corpus delivery: `taiwan.md` ships INSIDE the engine image at
# `/usr/local/share/corpora/taiwan.md` (see `packaging/engine/BUILD.bazel`
# §`corpus_files`). Forks override the `--corpus` flag below to
# point at whatever corpus delivery mechanism they use (S3 mount,
# ConfigMap, init-container pull from git).
#
# Known dependency on model storage layer: `engine seed` loads
# bge-m3-q4km from the manifest's CAS path (ROADMAP Phase 4c
# "Engine startup manifest validation + SHA verify"). On the AWS
# targets that storage is now seeded on bring-up by the Phase 4c
# model-populate Job (components/aws-binding/model-populate-job.yaml,
# a PreSync hook that runs BEFORE this PostSync seed Job), so the
# engine's model-fetch init finds a non-empty bucket. The populator
# uses a dedicated WRITE EKS Pod Identity role owned by the platform
# Terraform — NO ldz #85 IAM grant is needed (Pod Identity issues the
# credentials in-cluster). The on-prem twin is the minio-bootstrap Job.
# (The populator currently seeds whisper-tiny-en; bge-m3 joins the same
# CAS tree when it is pinned + added to the populated set.)
spec:
  # 24h TTL on completed Jobs (success or final failure). Enough
  # time for the operator to inspect on the morning review without
  # accumulating dead Job records over weeks of syncs.
  ttlSecondsAfterFinished: 86400
  # 3 retries on transient failures (Qdrant API hiccup, transient
  # S3-CSI mount delay). Beyond 3, surface the failure to the
  # operator rather than retrying forever.
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-core-engine-seed
        app.kubernetes.io/part-of: aegis-core
        app.kubernetes.io/component: rag-seed
    spec:
      # Reuse the engine ServiceAccount (IRSA-annotated by ldz with
      # role `aegis-staging-aegis-engine`) so the Job inherits the
      # same AWS identity as the Rollout — relevant when the model
      # storage layer comes online and S3 reads need IRSA creds.
      serviceAccountName: aegis-core-engine
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seed
          # Pinned to the same image SHA the engine Rollout uses.
          # The `bump-image-tag` job in release-staging-image.yml
          # rewrites this line and the Rollout's in lockstep after
          # each release build (ADR-0032, re-decided 2026-05-17).
          #
          # Static public GHCR ref (ghcr-graviton pivot) — the SAME image as
          # the engine Rollout (ADR-14 seed=engine). Pinned BY DIGEST per
          # overlay to the engine's digest via JSON6902 patch
          # (`ghcr.io/binhsu/aegis-core-engine@sha256:<engine-digest>`).
          image: ghcr.io/binhsu/aegis-core-engine
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/engine"]
          args:
            - seed
            - --corpus
            - /usr/local/share/corpora/taiwan.md
            - --target=cloud
          env:
            # Same env block as the Rollout (rollout.yaml §env).
            # Match exactly so seed and serve see identical model /
            # vector-DB state.
            # CAS ROOT DIRECTORY (see rollout.yaml §env for the full rationale).
            # Stale pre-CAS file path corrected to the model root; the engine
            # resolves <root>/<id>/<sha256>.<ext> and SHA-verifies at startup.
            - name: AEGIS_MODEL_PATH
              value: "/models"
            # Manifest ships in the image, outside /models (see rollout.yaml).
            - name: AEGIS_MANIFEST_PATH
              value: "/usr/local/share/aegis/models/manifest.json"
            - name: QDRANT_URL
              valueFrom:
                secretKeyRef:
                  name: qdrant-credentials
                  key: QDRANT_URL
                  # optional — same reason as the engine Rollout: a missing
                  # qdrant-credentials Secret must not block the pod at
                  # CreateContainerConfigError before the seed binary can run.
                  optional: true
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qdrant-credentials
                  key: QDRANT_API_KEY
                  optional: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            # Smaller envelope than the Rollout — the seed flow
            # loads bge-m3-q4km (~600MB) for embeddings but does
            # NOT load whisper / diarization. 1Gi/2Gi covers the
            # embedder + chunker working set.
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        # MODEL STORAGE: emptyDir, populated at runtime by the engine
        # Rollout's model-fetch init (`aws s3 sync` on AWS, the SPIRE→
        # MinIO chain on-prem). On the AWS targets the bucket is seeded
        # on bring-up by the Phase 4c model-populate Job (a PreSync hook,
        # components/aws-binding/model-populate-job.yaml) using a dedicated
        # WRITE EKS Pod Identity role owned by the platform Terraform — NO
        # ldz #85 CI grant. (bge-m3 still needs adding to the populated set
        # before this seed Job loads it; tiny.en is seeded today.)
        - name: models
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
