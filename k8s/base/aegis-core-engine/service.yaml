apiVersion: v1
kind: Service
metadata:
  name: aegis-core-engine
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis-core-engine
    app.kubernetes.io/part-of: aegis-core
  annotations:
    # Headless-service rationale: ADR-0017 "Gateway–Engine Topology
    # — N:N-ready by design". clusterIP: None causes this Service's
    # DNS name to resolve to the set of backing pod IPs (one A/AAAA
    # record per ready pod), not a single VIP. gRPC's DNS resolver
    # sees them all and, combined with
    # `loadBalancingConfig:[{"round_robin":{}}]` in the dial options,
    # spreads calls across every engine replica in the ReplicaSet.
    # If we used ClusterIP here, every gRPC call would land on the
    # same pod until the kube-proxy connection was torn down — the
    # classic "gRPC pins to one backend" footgun.
    aegis.binhsu.org/topology-rationale: adr-0017-headless-for-grpc-lb
spec:
  # Headless — see annotation above.
  clusterIP: None
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aegis-core-engine
  # publishNotReadyAddresses: false (default) — gRPC round_robin
  # resolver should only target pods whose /healthz passes. Until
  # probes land (see deployment.yaml §"PROBES DEFERRED"), every
  # pod in the ReplicaSet shows as ready immediately. This will
  # tighten once C-2 adds grpc.health.v1.Health registration.
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
    # Prometheus pull endpoint — C-Obs-1, ldz #46 §"Q3". Even though
    # the Service is headless (spec.clusterIP: None) for gRPC round-
    # robin DNS, Prometheus Operator's ServiceMonitor still works
    # against headless Services — it scrapes the pod IPs directly,
    # which is exactly what we want for per-replica metric visibility.
    - name: metrics
      port: 8081
      targetPort: metrics
      protocol: TCP
