apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-core-engine
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: aegis-core-engine
    app.kubernetes.io/part-of: aegis-core
  # Provider-neutral base (WS1): this SA carries NO cloud identity marker.
  # ADR-21 §A: on the EKS targets the engine's identity is now EKS Pod Identity,
  # bound by the platform Terraform through an EKS-API association
  # (regional-stack/pod-identity-engine.tf) — NOT an eks.amazonaws.com/role-arn
  # annotation. So the AWS overlay no longer patches an annotation onto this SA;
  # it stays bare on every target. On a neutral/on-prem target the engine's
  # identity is supplied differently (SPIFFE/SPIRE or sealed-secret) — WS2.
