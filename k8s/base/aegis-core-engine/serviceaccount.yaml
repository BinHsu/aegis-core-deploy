apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-core-engine
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis-core-engine
    app.kubernetes.io/part-of: aegis-core
  annotations:
    # ldz #54 pre-provisioned an IRSA role whose trust policy must
    # scope to `system:serviceaccount:aegis:aegis-core-engine` (the
    # ServiceAccount was renamed from `aegis-engine` per CLAUDE.md
    # Rule 11 — full-repo-name prefix). The permission policy on the
    # role is currently empty (skeleton) and will be populated on the
    # ldz side when engine gains concrete AWS API surface (e.g., S3
    # model streaming per ADR-0026 follow-ups). The annotation is
    # added now so the IRSA contract is complete from this side;
    # AWS-side permissions attach independently.
    #
    # CROSS-REPO: the role's trust-policy subject + the role name
    # itself are ldz-owned. Until ldz updates the trust policy to the
    # new `aegis-core-engine` SA subject (tracked in the cross-repo
    # rename issue on aegis-aws-landing-zone), IRSA token exchange for
    # this SA will fail. The role ARN below is left at its ldz-owned
    # name — ldz decides whether to rename the role itself.
    eks.amazonaws.com/role-arn: arn:aws:iam::251774439261:role/aegis-staging-aegis-engine
