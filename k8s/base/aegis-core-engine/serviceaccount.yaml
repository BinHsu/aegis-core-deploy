apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-core-engine
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: aegis-core-engine
    app.kubernetes.io/part-of: aegis-core
  annotations:
    # IRSA role-arn reconciled (aegis-platform ADR-07). The hardcoded
    # cross-account ARN that used to live here pointed at
    # `aegis-staging-aegis-engine` — a role NEVER provisioned in the landing
    # zone (a dangling/phantom reference). It is gone.
    #
    # The engine's role is now WORKLOAD-DECLARED as an ACK Role CRD
    # (../iam/aegis-core-engine-role.yaml, trust subject
    # system:serviceaccount:aegis-core:aegis-core-engine) and provisioned by
    # the platform's ACK IAM controller in the cluster account. The
    # `eks.amazonaws.com/role-arn` annotation is INJECTED here at sync time by
    # the platform ApplicationSet (it builds the ARN from the cluster account +
    # the role name aegis-workload/aegis-core-engine), so this public repo
    # commits no account ID. The marker below keeps the annotations map present
    # as the JSON-patch target for that injection.
    #
    # ⚠️ implemented, E2E PENDING platform bootstrap — issue #6 gate: "ACK
    # provisions the engine IAM role from the CRD (role exists + correct trust
    # subject)", then the engine SA resolves the injected role-arn.
    aegis.binhsu.org/irsa-role-arn: platform-injected
