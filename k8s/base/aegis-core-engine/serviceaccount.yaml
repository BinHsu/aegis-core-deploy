apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-core-engine
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: aegis-core-engine
    app.kubernetes.io/part-of: aegis-core
  # Provider-neutral base (WS1): the AWS IRSA marker annotation
  # (`aegis.binhsu.org/irsa-role-arn`) moved to components/aws-binding, which
  # patches it back on for the EKS targets. On a neutral/on-prem target the
  # engine's identity is supplied differently (SPIFFE/SPIRE or sealed-secret) —
  # that substitute is WS2; this base SA carries no cloud identity marker.
