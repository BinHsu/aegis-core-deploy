apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegis-core-gateway
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: aegis-core-gateway
    app.kubernetes.io/part-of: aegis-core
  annotations:
    # ldz #54 platform contract imposes a default-deny NetworkPolicy
    # on this namespace. Without explicit allow rules below, the
    # gateway pod would be unreachable from the ALB and unable to
    # reach the engine, regardless of how correct the Service +
    # Ingress + Deployment specs are. This manifest adds only the
    # minimum allow edges needed for Phase 4c C-1.
    aegis.binhsu.org/policy-rationale: ldz-54-default-deny-allowlist
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: aegis-core-gateway
  policyTypes: [Ingress, Egress]
  ingress:
    # ALB (aws-load-balancer-controller, target-type=ip) sends
    # traffic directly to the pod IP from the ALB's subnet IPs.
    # Omitting `from` = allow from any source on the port below,
    # which is acceptable because (a) the ALB is the only thing
    # that routes to this pod's 8080 in-cluster, and (b) K8s
    # NetworkPolicy cannot express "from the ALB subnets" natively
    # without an ipBlock CIDR — which would couple this file to
    # ldz's VPC numbering and break forker portability.
    - ports:
        - port: 8080
          protocol: TCP
    # Prometheus pull on :8081 — C-Obs-1, ldz #46 contract.
    # Scrape originates from `monitoring` namespace where
    # kube-prometheus-stack runs (ldz #54 §Observability).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8081
          protocol: TCP
  egress:
    # Egress to the engine (headless Service → pod IPs on port 50051).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: aegis-core-engine
      ports:
        - port: 50051
          protocol: TCP
    # Egress to AWS APIs over HTTPS. Gateway calls Cognito
    # (ADR §10.6) and may call DynamoDB/S3 in later phases.
    # No `to` = any destination on 443; AWS PrivateLink endpoints
    # and public AWS endpoints both resolve fine under this rule.
    - ports:
        - port: 443
          protocol: TCP
    # NOTE: DNS egress to kube-system/kube-dns is already allowed
    # by ldz's default-deny policy (ldz #54) — no explicit rule
    # needed here.
