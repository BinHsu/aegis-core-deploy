apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: aegis-core-gateway
  namespace: aegis-core
  annotations:
    # Standalone-build defaults for the platform-injected annotations.
    # These live on the BASE resource (not overlay commonAnnotations) because
    # ArgoCD's injection mechanism runs `kustomize edit add annotation <k:v>`
    # WITHOUT --force, which refuses keys already present in the kustomization
    # file ("annotation already in kustomization file. Use --force to
    # override." — caught live 2026-06-12 on aegis-greeter-deploy #6). Placing
    # the defaults here as literal resource annotations instead means the
    # overlay kustomization files declare NO value for these keys — so
    # ArgoCD's edit-add-annotation succeeds, and the commonAnnotations
    # transformer overrides these literals at sync time with the real values
    # injected by the platform ApplicationSet.
    aegis.binhsu.org/ecr-repository: aegis-core
    aegis.binhsu.org/region: local
  labels:
    app.kubernetes.io/name: aegis-core-gateway
    app.kubernetes.io/part-of: aegis-core
    app.kubernetes.io/component: api-gateway
# Phase 4c-5a initial slice of ADR-0030 Progressive Delivery Controller:
# Deployment → Rollout CRD conversion. The controller + ALB traffic-
# router plugin are installed cluster-side (ldz #103 closed 2026-04-23).
#
# Scope reduction — these ADR-0030 items are deferred to follow-up
# slices rather than bundled here:
#
#   - ALB trafficRouting (canaryService + stableService + TargetGroup
#     weight shifts) — C-5a follow-up. Without it, `setWeight` at this
#     layer means "split ReplicaSet replica counts"; traffic still
#     follows the Service load-balance across all matching pods, which
#     at 2 replicas gives a usable 50/50 canary without the
#     TargetGroupBinding wiring.
#   - AnalysisTemplate SLO gates — C-5b, explicitly deferred per
#     ADR-0030 §"Honest phasing" until Phase 4d emits the burn-rate
#     metrics that drive automatic rollback.
spec:
  # Two replicas to exercise ADR-0017's N:N assumption in staging.
  # Scaling policy (HPA) deferred until Phase 4d emits metrics.
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-core-gateway
  strategy:
    canary:
      # 50/50 soak for 2 minutes before the Rollout promotes the canary
      # ReplicaSet to stable. Deliberately minimal pending the Phase 4d
      # SLO-gated AnalysisTemplate (C-5b). Time-based pause gives
      # operators a window to eyeball logs / dashboards before full
      # promote; auto-rollback lands with the metric pipeline.
      steps:
        - setWeight: 50
        - pause:
            duration: 2m
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-core-gateway
        app.kubernetes.io/part-of: aegis-core
        app.kubernetes.io/component: api-gateway
    spec:
      serviceAccountName: aegis-core-gateway
      # ADR-0006 Graceful Shutdown — 30s matches Go gateway's drain
      # timeout; long enough for in-flight WebRTC sessions to finish
      # server-side cleanup, short enough to not pin rolling updates.
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          # === IMAGE TAG — CI-managed ===
          # This line is rewritten by the `bump-image-tag` job in
          # release-staging-image.yml after each release build
          # (ADR-0032, re-decided 2026-05-17). Edit it by hand only
          # when bootstrapping; normal releases bump it automatically.
          #
          # Neutral default (WS1, ADR-10/14). Neither registry nor version is
          # carried here: the real image is pinned BY DIGEST in each overlay
          # (`aegis-core@sha256:<gateway-digest>`, a JSON6902 patch — kustomize's
          # images: transformer can't reach a Rollout CRD nor distinguish the
          # gateway/engine images that share the name `aegis-core`), and the
          # overlay's replacement splices the platform-injected registry in
          # front. Bare `aegis-core` is the standalone-build default only.
          image: aegis-core
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            # Prometheus pull endpoint — C-Obs-1.
            - name: metrics
              containerPort: 8081
              protocol: TCP
          env:
            # DEPLOY_MODE is NOT set in the neutral base (ADR-16): it is the
            # provider-mode switch the Go gateway reads (cmd/gateway/main.go —
            # tracing exporter + auth provider). Each binding injects it:
            # aws-binding → DEPLOY_MODE=cloud (+ Cognito OIDC env); onprem-binding
            # → DEPLOY_MODE=local. (The prior `AEGIS_DEPLOY_MODE: CLOUD` here was
            # both non-neutral AND a misname — the Go code reads DEPLOY_MODE, so
            # it was dead config; removed in WS3.)
            - name: AEGIS_ENGINE_ADDR
              # Headless Service DNS — gRPC client-side round_robin
              # resolver walks all backing pod IPs (ADR-0017).
              value: "aegis-core-engine.aegis-core.svc.cluster.local:50051"
            - name: AEGIS_LOG_LEVEL
              value: "info"
            # Downward API → trace-aware slog handler (Phase 4d
            # log<->trace correlation). The gateway injects these as
            # static `pod` / `node` fields on every structured log
            # record alongside trace_id / span_id, so an operator can
            # pivot from a Tempo trace to the exact pod's Loki logs.
            # Unset in Local mode → the handler omits the fields.
            - name: AEGIS_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AEGIS_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Continuous profiling — 4th observability signal (ADR-0035).
            # Empty until the landing-zone provisions Grafana Cloud
            # Pyroscope ingest (tracked as a separate cross-repo issue);
            # the profiling package is fail-soft, so an empty value
            # degrades profiling to a no-op without blocking startup.
            - name: AEGIS_PYROSCOPE_ENDPOINT
              value: ""
          securityContext:
            # ADR-0025 distroless nonroot + defense-in-depth hardening.
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            # Starting values — Phase 4d HPA will tune once metrics
            # emit. Gateway is primarily an I/O orchestrator, not
            # compute-heavy, so memory baseline is modest.
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          # Drain-aware readiness probe (ADR-0006 §Graceful Shutdown).
          # /readyz answers 503 before listeners bind and during the
          # SIGTERM drain, so the controller marks the pod NotReady and
          # stops routing NEW traffic while in-flight WebRTC sessions
          # finish server-side. Distinct from /healthz (liveness):
          # readiness failure removes the pod from Service endpoints
          # WITHOUT a restart.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          volumeMounts:
            # readOnlyRootFilesystem: true requires writable /tmp
            # for any ephemeral buffering. Kept small and tmpfs-backed
            # to honor ADR-0005 R5 "no host disk for audio".
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: aegis-core-gateway
