apiVersion: v1
kind: Service
metadata:
  name: aegis-core-gateway
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: aegis-core-gateway
    app.kubernetes.io/part-of: aegis-core
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aegis-core-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    # Prometheus pull endpoint — C-Obs-1, ldz #46 §"Q3" contract
    # (K8s controller-runtime convention :8080 main + :8081 mgmt).
    # ServiceMonitor references this by name, not port number, so
    # changing the literal is a single-manifest edit.
    - name: metrics
      port: 8081
      targetPort: metrics
      protocol: TCP
