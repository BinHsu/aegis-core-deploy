apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: aegis-core-gateway
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: aegis-core-gateway
    app.kubernetes.io/part-of: aegis-core
    # ldz #54 / landing-zone ADR-015 discovery contract —
    # Prometheus Operator picks up any ServiceMonitor regardless
    # of namespace; the part-of label matches the filter ldz's
    # kube-prometheus-stack applies internally.
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-core-gateway
  namespaceSelector:
    matchNames: [aegis-core]
  endpoints:
    # Named port reference (not literal `:8081`) so the Service
    # contract stays swap-resistant if the convention ever shifts
    # off of :8081. ADR-0033 + ldz #46 §"Q3" document the choice.
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: false
