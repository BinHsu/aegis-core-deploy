apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-core-gateway
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis-core-gateway
    app.kubernetes.io/part-of: aegis-core
  # ARCH §10.6 "Identity First (EKS Pod Identity & Cognito)": no
  # hardcoded AWS credentials. When Phase 4c+ introduces DynamoDB /
  # S3 access from the gateway, this ServiceAccount gains an
  # `eks.amazonaws.com/role-arn` annotation (IRSA) OR the ldz-side
  # PodIdentityAssociation is created, at which point the gateway
  # transparently assumes the IAM role. C-1 has no AWS API access
  # yet; this SA is a skeleton for that future wiring.
