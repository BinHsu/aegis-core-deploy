apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-core-gateway
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis-core-gateway
    app.kubernetes.io/part-of: aegis-core
  annotations:
    # ldz installs `aws-load-balancer-controller` in the staging
    # EKS cluster; this Ingress creates an external-facing ALB
    # in the public subnets tagged `kubernetes.io/role/elb`.
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    # ACM certificate for `aegis-api.staging.binhsu.org`. Materialized
    # by ldz on 2026-04-24 via baseline workflow run 24894738583
    # (closes ldz #101 + aegis-core #50). DNS validation ISSUED via
    # Route53 zone `staging.binhsu.org`. Cert region eu-central-1
    # (regional ACM for ALB per ldz ADR-019's CloudFront-ACM-us-east-1
    # vs ALB-ACM-regional split).
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-central-1:251774439261:certificate/208f2377-0326-4823-bbbe-e3dff94678ef
    # Healthcheck path for ALB target group probing.
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/success-codes: "200"
    # Weighted target groups API — needed later for Argo Rollouts
    # ALB traffic-router plugin (C-5a). Enabling the feature now
    # costs nothing; the plugin will populate weights when active.
    alb.ingress.kubernetes.io/actions.weighted-routing: ""
spec:
  rules:
    # DNS — `aegis-api.staging.binhsu.org` is the intended hostname.
    # Route53 record creation is ldz-side; C-1 assumes it will be
    # provisioned alongside the ACM cert above. ArgoCD will surface
    # the Ingress resource as pending-validation until DNS + cert
    # are in place; this is expected behaviour on first bring-up,
    # not a failure of this manifest.
    - host: aegis-api.staging.binhsu.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-core-gateway
                port:
                  name: http
