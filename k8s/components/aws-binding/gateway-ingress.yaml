apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-core-gateway
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: aegis-core-gateway
    app.kubernetes.io/part-of: aegis-core
  annotations:
    # ldz installs `aws-load-balancer-controller` in the staging
    # EKS cluster; this Ingress creates an external-facing ALB
    # in the public subnets tagged `kubernetes.io/role/elb`.
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    # ACM certificate-arn is INJECTED by the platform ApplicationSet at sync
    # time (account-ID hide). WS3-R: the platform now provisions a PER-REGION
    # cert (regional acm.tf) and injects that region's ARN automatically — so
    # multi-region is correct (each region's ALB gets its own-region cert), no
    # longer the old single-map-value limitation.
    # Healthcheck path for ALB target group probing.
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/success-codes: "200"
    # Weighted target groups API — needed later for Argo Rollouts
    # ALB traffic-router plugin (C-5a). Enabling the feature now
    # costs nothing; the plugin will populate weights when active.
    alb.ingress.kubernetes.io/actions.weighted-routing: ""
    # external-dns LATENCY routing (WS3-R, ADR-05; mirrors greeter's pattern).
    # Two regions serve the SAME host (spec.rules host below) as distinct
    # latency-routed Route 53 records; Route 53 returns the nearest healthy
    # region. set-identifier + aws-region are PLACEHOLDERS ("local"), rewritten
    # per-region by the staging/prod overlay `replacements` sourcing
    # aegis.binhsu.org/region (injected by the platform ApplicationSet). Each
    # region's external-dns owns only its own record (txtOwnerId = cluster name),
    # so the two coexist. evaluate-target-health gives automatic failover.
    external-dns.alpha.kubernetes.io/set-identifier: "local"
    external-dns.alpha.kubernetes.io/aws-region: "local"
    external-dns.alpha.kubernetes.io/aws-evaluate-target-health: "true"
spec:
  rules:
    # DNS host. Component default is the STAGING hostname; the prod overlay
    # patches it to `aegis-api.prod.aws.binhsu.org` (WS3-R: per-env subdomain
    # under aws.binhsu.org, delegated from Cloudflare). Route53 record + ACM cert
    # are platform-side; ArgoCD surfaces the Ingress as pending-validation until
    # DNS + cert are in place — expected on first bring-up, not a failure.
    - host: aegis-api.staging.aws.binhsu.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-core-gateway
                port:
                  name: http
