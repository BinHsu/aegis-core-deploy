apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-core-gateway
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: aegis-core-gateway
    app.kubernetes.io/part-of: aegis-core
  annotations:
    # ldz installs `aws-load-balancer-controller` in the staging
    # EKS cluster; this Ingress creates an external-facing ALB
    # in the public subnets tagged `kubernetes.io/role/elb`.
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    # ACM certificate-arn is INJECTED by the platform ApplicationSet at sync
    # time (aegis-platform ADR-07 ⑥ / account-ID hide) — the ARN embeds an AWS
    # account ID, so it no longer lives in this public repo. The platform
    # supplies the region-correct, cluster-account cert from its gitignored
    # registries map (ingress_cert.cert_arn). ⚠️ implemented, E2E PENDING
    # platform bootstrap — and per-region cert correctness is a bootstrap
    # refinement (one map value is single-region only).
    # Healthcheck path for ALB target group probing.
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/success-codes: "200"
    # Weighted target groups API — needed later for Argo Rollouts
    # ALB traffic-router plugin (C-5a). Enabling the feature now
    # costs nothing; the plugin will populate weights when active.
    alb.ingress.kubernetes.io/actions.weighted-routing: ""
spec:
  rules:
    # DNS host. This component default is the STAGING hostname; the prod
    # overlay patches it to `aegis-api.binhsu.org` (WS3, ADR-19 real-domain
    # decision — binhsu.org). Route53 record + ACM cert are platform-side;
    # ArgoCD surfaces the Ingress as pending-validation until DNS + cert are
    # in place — expected on first bring-up, not a manifest failure.
    - host: aegis-api.staging.binhsu.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-core-gateway
                port:
                  name: http
