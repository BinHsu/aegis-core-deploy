apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# AWS binding (WS1). The additive layer that makes the provider-neutral base
# an EKS target — ADR-16's "AWS is one target bound by an additive overlay,
# never the default others retrofit around". Included by overlays/staging and
# overlays/prod; the Talos target (overlays/talos) does NOT include it and gets
# a Gateway API HTTPRoute + on-prem substitutes instead.
#
# What lives here and why it is AWS-specific:
#   - gateway-ingress.yaml        ALB Ingress (aws-load-balancer-controller)
#
# ADR-21 §A: the engine's IAM is now EKS Pod Identity, OWNED BY THE PLATFORM
# TERRAFORM (regional-stack/pod-identity-engine.tf), not composed in-cluster by
# Crossplane. Two things that used to live here are GONE:
#   - iam/ (the WorkloadIdentity XR -> upjet Role -> AWS IAM) — the role is now a
#     Terraform aws_iam_role, so there is no claim to ship.
#   - the engine SA's eks.amazonaws.com/role-arn IRSA-marker annotation patch —
#     Pod Identity binds the SA through an EKS-API association (Terraform), so the
#     SA needs NO role-arn annotation. The engine SA stays bare (base SA).
# The model-fetch init-container is unchanged: the AWS SDK gets credentials from
# the Pod Identity agent transparently, exactly as it did from the IRSA webhook.
#
# ServiceMonitors removed (WS3): the platform cluster has no prometheus-operator
# (no monitoring.coreos.com CRDs). Observability is Grafana-Alloy-native — Alloy
# scrapes pods via discovery.kubernetes + label relabeling and does NOT consume
# ServiceMonitors. Keeping them caused ArgoCD sync failures on the staging cluster.
#
# DEFERRED (documented per Bin 2026-06-16): the on-prem substitutes for the
# identity axis (IRSA -> SPIFFE/SPIRE or sealed-secret) and L7 (ALB -> Gateway API)
# are WS2/WS0 scope, not WS1. WS1 only proves the contract is target-swappable; it
# does not build the on-prem substitutes.
resources:
  - gateway-ingress.yaml
  - model-store-configmap.yaml
  - gateway-oidc-configmap.yaml

# Mirror the base's managed-by label onto these component resources — the
# base `labels` transformer only reaches base resources, so without this the
# moved resources would lose the label (render-parity regression caught in WS1).
labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
    includeSelectors: false

patches:
  # ADR-21 §A: the engine SA IRSA-marker annotation patch
  # (eks.amazonaws.com/role-arn = platform-injected) is REMOVED. Workload IAM is
  # EKS Pod Identity (platform Terraform, regional-stack/pod-identity-engine.tf):
  # the SA↔role binding is an EKS-API association, not an SA annotation, so the
  # engine SA stays bare. The model-read grant (s3:GetObject + s3:ListBucket) is
  # an inline policy on the Terraform-owned role — no WorkloadIdentity claim, no
  # injected policy ARN here. The init-container below is unchanged; the AWS SDK
  # transparently picks up Pod Identity credentials.

  # =========================================================================
  # Engine Rollout: AWS model delivery (WS3 — the AWS twin of onprem-binding's
  # WS2-3 chain). IRSA collapses the on-prem three-step chain (SPIRE JWT-SVID →
  # MinIO STS → mc mirror) to ONE init-container: the EKS pod-identity webhook
  # injects a projected web-identity token + AWS_ROLE_ARN, and the AWS SDK does
  # the AssumeRoleWithWebIdentity exchange transparently. So a single aws-cli
  # `s3 sync` mirrors the model bucket into the /models CAS store.
  #
  # The init mounts `models` read-WRITE to populate it; the engine container
  # keeps its read-only mount. `models` and `tmp` already exist on the base pod
  # (tmp gives the cli a writable HOME under readOnlyRootFilesystem). No new
  # volumes. automountServiceAccountToken:false on the base is fine — the IRSA
  # webhook adds its own `aws-iam-token` projected volume regardless.
  #
  # JSON6902 (not strategic merge) because kustomize has no openapi schema for
  # the Rollout CRD. Image digest-pinned (validate.yml Guard A).
  # =========================================================================
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: aegis-core-engine
    patch: |-
      - op: add
        path: /spec/template/spec/initContainers
        value:
          - name: model-fetch
            image: public.ecr.aws/aws-cli/aws-cli@sha256:017ee8e2aa180f47597daa31219991fbea9377645e55f8070aeaadb156573807
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                echo "syncing model store from s3://${AEGIS_MODEL_BUCKET} ..."
                aws s3 sync "s3://${AEGIS_MODEL_BUCKET}" /models
                # Gate (mirrors onprem mc-stat): a misconfigured/empty bucket
                # must fail LOUD here, not silently let the engine crashloop on
                # a missing model. The engine SHA-verifies each model at startup,
                # so a non-empty /models is the right delivery-layer assertion.
                [ -n "$(ls -A /models 2>/dev/null)" ] || { echo "ERROR: model bucket empty / sync delivered nothing" >&2; exit 1; }
                echo "model CAS populated."
            env:
              # aws-cli needs a writable HOME (creds cache) under
              # readOnlyRootFilesystem — point it at the tmp emptyDir.
              - name: HOME
                value: /tmp
              - name: AEGIS_MODEL_BUCKET
                valueFrom:
                  configMapKeyRef:
                    name: aegis-core-model-store
                    key: bucket
            securityContext:
              runAsNonRoot: true
              runAsUser: 65532
              runAsGroup: 65532
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "1000m"
                memory: "512Mi"
            volumeMounts:
              - name: models
                mountPath: /models
              - name: tmp
                mountPath: /tmp

  # =========================================================================
  # Gateway Rollout: AWS provider mode + Cognito OIDC (WS3, ADR-19).
  # DEPLOY_MODE=cloud flips the Go gateway onto the OIDCProvider (RS256 Bearer
  # validation) and the cloud tracing exporter. The three Cognito values come
  # from the gateway-oidc ConfigMap (deploy-injected placeholders). The auth
  # code is already provider-neutral — this binding is pure data injection.
  # =========================================================================
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: aegis-core-gateway
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DEPLOY_MODE
          value: cloud
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AEGIS_COGNITO_ISSUER
          valueFrom:
            configMapKeyRef:
              name: aegis-core-gateway-oidc
              key: issuer
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AEGIS_COGNITO_AUDIENCE
          valueFrom:
            configMapKeyRef:
              name: aegis-core-gateway-oidc
              key: audience
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AEGIS_COGNITO_JWKS_URL
          valueFrom:
            configMapKeyRef:
              name: aegis-core-gateway-oidc
              key: jwksUrl

  # =========================================================================
  # Seed Job: same single model-fetch init-container (the seed Job loads
  # bge-m3 from the same /models CAS — see seed-job.yaml). The Job's main
  # container mounts models read-only; the init mounts it read-write.
  # =========================================================================
  - target:
      group: batch
      version: v1
      kind: Job
      name: aegis-core-engine-seed
    patch: |-
      - op: add
        path: /spec/template/spec/initContainers
        value:
          - name: model-fetch
            image: public.ecr.aws/aws-cli/aws-cli@sha256:017ee8e2aa180f47597daa31219991fbea9377645e55f8070aeaadb156573807
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                echo "syncing model store from s3://${AEGIS_MODEL_BUCKET} ..."
                aws s3 sync "s3://${AEGIS_MODEL_BUCKET}" /models
                [ -n "$(ls -A /models 2>/dev/null)" ] || { echo "ERROR: model bucket empty / sync delivered nothing" >&2; exit 1; }
                echo "model CAS populated."
            env:
              - name: HOME
                value: /tmp
              - name: AEGIS_MODEL_BUCKET
                valueFrom:
                  configMapKeyRef:
                    name: aegis-core-model-store
                    key: bucket
            securityContext:
              runAsNonRoot: true
              runAsUser: 65532
              runAsGroup: 65532
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "1000m"
                memory: "512Mi"
            volumeMounts:
              - name: models
                mountPath: /models
              - name: tmp
                mountPath: /tmp
