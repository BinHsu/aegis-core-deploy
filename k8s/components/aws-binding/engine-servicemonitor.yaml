apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: aegis-core-engine
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: aegis-core-engine
    app.kubernetes.io/part-of: aegis-core
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-core-engine
  namespaceSelector:
    matchNames: [aegis-core]
  endpoints:
    # Same named-port + interval convention as the gateway —
    # single-pattern ServiceMonitor template per ldz #46 §"Q3"
    # recommendation for cross-service symmetry.
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: false
