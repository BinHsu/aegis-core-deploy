# Workload identity declared via the platform's WorkloadIdentity XR (ADR-09).
#
# Before ADR-09, this file declared an ACK iam.services.k8s.aws/Role directly,
# with OIDC_PROVIDER_ARN / OIDC_PROVIDER placeholders that the platform had to
# inject at bootstrap (kustomize cannot token-replace inside a JSON string, so
# the workaround was a hand-wavy "platform somehow injects them"). ADR-09 moves
# that cluster-scoped detail into the platform's Crossplane Composition. This
# deploy repo now declares only what is genuinely workload-owned:
#   - which ServiceAccount in this namespace assumes the role
#   - optionally, which managed policies attach
#
# The trust subject (system:serviceaccount:aegis-core:aegis-core-engine) is
# derived by the Composition from spec.claimRef.namespace (this Claim's own
# namespace) + spec.parameters.serviceAccountName — not user-supplied. So a
# Claim cannot trust a SA in another namespace by construction.
#
# Defense in depth still applies:
#   - 5th layer (ADR-09)      — Kyverno restricts WorkloadIdentity Claims to
#                               workload namespaces (aegis-policies chart).
#   - 4-pack #2 (ADR-07)      — the existing trust-subject ClusterPolicy
#                               validates the rendered ACK Role document.
#   - 4-pack #1 (landing-zone)— SCP carve-out only allows the ACK controller
#                               principal to manage IAM under
#                               /aegis-workload/* with the named prefix.
#
# ⚠️ implemented, E2E PENDING platform bootstrap — issue #6 gate validates
# end-to-end: the Composition provisions the IAM role from this Claim with the
# correct trust subject and the SA can call AWS as it.
apiVersion: platform.aegis.io/v1alpha1
kind: WorkloadIdentity
metadata:
  name: aegis-core-engine
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: aegis-core-engine
    app.kubernetes.io/part-of: aegis-core
  annotations:
    aegis.binhsu.org/status: "implemented, E2E PENDING platform bootstrap"
spec:
  parameters:
    serviceAccountName: aegis-core-engine
    # policyArns is intentionally a SKELETON — added when the engine gains
    # concrete AWS API surface (e.g. S3 model streaming per aegis-core
    # ADR-0026). The role provisioning + trust subject are what issue #6's
    # gate validates first.
