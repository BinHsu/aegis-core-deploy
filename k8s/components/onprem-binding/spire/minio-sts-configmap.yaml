# MinIO STS Role ARN for the engine's AssumeRoleWithWebIdentity exchange (WS2-3).
#
# MinIO runs in role-policy mode (MINIO_IDENTITY_OPENID_ROLE_POLICY). In that
# mode MinIO derives a Role ARN from the OIDC provider config at startup and
# REQUIRES it on every AssumeRoleWithWebIdentity call. The ARN is a hash of the
# config — not predictable and not settable — so it must be discovered once per
# deployment and supplied here.
#
# AUTO-POPULATED (WS2-R, gap #1). The value below is a PLACEHOLDER — the
# minio-bootstrap Job's `populate-sts-arn` step discovers the real ARN from
# MinIO's startup log and patches it in (minio/bootstrap-job.yaml +
# minio/bootstrap-rbac.yaml). No operator step. The engine/seed sts-exchange
# init-container reads role_arn from this ConfigMap mounted as a FILE and waits
# until the placeholder is replaced — so it self-heals once the bootstrap lands
# the ARN, with no pod restart and no manual ordering. (env-via-configMapKeyRef
# would freeze the placeholder at pod start; a mounted file updates in place.)
#
# Manual fallback (only if you disable the bootstrap step or are debugging it):
#   kubectl -n aegis-core logs deploy/minio | grep -i 'rolearn'
#   kubectl -n aegis-core patch configmap minio-sts --type merge \
#     -p '{"data":{"role_arn":"arn:minio:iam:::role/<hash>"}}'
#
# Why a ConfigMap and not a root-credential lookup in the engine init-container:
# WS2-3's whole point is to remove static root creds from the engine path (the
# IRSA-fidelity win). The engine reads only this ARN + its own JWT-SVID; it never
# sees MINIO_ROOT_USER/PASSWORD.
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-sts
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: minio-sts
    app.kubernetes.io/part-of: aegis-core
    app.kubernetes.io/managed-by: argocd
data:
  role_arn: "arn:minio:iam:::role/REPLACE_WITH_MINIO_OIDC_ROLE_ARN"
