# SPIRE Agent RBAC.
# Source: https://github.com/spiffe/spire-tutorials/blob/main/k8s/quickstart/agent-cluster-role.yaml
#
# The agent's WorkloadAttestor "k8s" plugin calls the kubelet read API to
# resolve which pod owns a given workload process. It needs GET access to
# pods, nodes, and nodes/proxy (the last allows proxying to the kubelet).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-agent
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: argocd
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "nodes/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-agent
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-agent
subjects:
  - kind: ServiceAccount
    name: spire-agent
    namespace: spire-system
