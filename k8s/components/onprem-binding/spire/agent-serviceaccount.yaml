apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-agent
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: argocd
# automountServiceAccountToken left at default (true).
# The agent's k8s_psat NodeAttestor presents a projected ServiceAccount token
# to the server during attestation. The token is mounted via a projected volume
# (not automount), but we still need the SA to exist with the right name so
# the k8s_psat validator on the server side (service_account_allow_list) can
# verify "this token belongs to spire-system:spire-agent".
automountServiceAccountToken: false
