apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-agent
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: argocd
# automountServiceAccountToken is explicitly DISABLED (false).
# The agent's k8s_psat NodeAttestor presents a projected ServiceAccount token
# to the server during attestation via a dedicated projected volume — it does
# NOT need the legacy auto-mounted token, so we drop it (least privilege). The
# SA must still exist with the right name so the k8s_psat validator on the
# server side (service_account_allow_list) can verify "this token belongs to
# spire-system:spire-agent".
automountServiceAccountToken: false
