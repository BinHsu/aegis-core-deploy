apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-bundle
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-bundle
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: argocd
# Data is empty at deploy time. The SPIRE Server's k8sbundle Notifier patches
# this ConfigMap with the current trust bundle CA cert once the server starts.
# The spire-agent mounts this ConfigMap as its trust_bundle_path.
# Source: https://github.com/spiffe/spire/blob/main/doc/plugin_server_notifier_k8sbundle.md
