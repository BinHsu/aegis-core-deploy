apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spire-server
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-server
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-server
  serviceName: spire-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-server
        app.kubernetes.io/part-of: spire
    spec:
      serviceAccountName: spire-server
      # automountServiceAccountToken: true is required — the spire-server uses its
      # mounted SA token to call the Kubernetes TokenReview API (k8s_psat attestor).
      # We leave automount on (default) and rely on the ClusterRole to scope what
      # the token can do. The alternative (projected token + manual volume) adds
      # complexity without meaningful security gain in this local-dev context.
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # --- SPIRE Server ---
        # Source: https://github.com/spiffe/spire-tutorials/blob/main/k8s/quickstart/server-statefulset.yaml
        - name: spire-server
          # Pinned digest (v1.11.2, linux/arm64-capable multi-arch index).
          image: ghcr.io/spiffe/spire-server@sha256:0ca091ecef5cbc19f2900a789f68ff5c00a31b056768468c6f2d4c3160a7f03c
          args: ["-config", "/run/spire/config/server.conf"]
          ports:
            - name: grpc
              containerPort: 8081
              protocol: TCP
            - name: health
              containerPort: 8080
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem: the server writes keys + sqlite3 to /run/spire/data
            # (emptyDir) and a socket to /run/spire/server-sockets (emptyDir).
            # The root fs itself is read-only; all writable paths are emptyDirs.
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /live
              port: health
            failureThreshold: 2
            initialDelaySeconds: 15
            periodSeconds: 60
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-data
              mountPath: /run/spire/data
            # Shared socket dir with oidc-discovery-provider sidecar
            - name: server-sockets
              mountPath: /run/spire/server-sockets

        # --- OIDC Discovery Provider sidecar ---
        # Co-located with spire-server so it can access the server socket via a
        # shared emptyDir. This avoids cross-pod gRPC and is the documented
        # "common pattern" for in-cluster OIDC.
        # Source: https://github.com/spiffe/spire/blob/main/support/oidc-discovery-provider/README.md
        - name: oidc-discovery-provider
          # Pinned digest (v1.11.2, linux/arm64-capable).
          image: ghcr.io/spiffe/oidc-discovery-provider@sha256:90378244db6523ee1309324b00811a7bac27e6146611165f834356880c3b1d04
          args: ["-config", "/run/spire/oidc-config/oidc-discovery-provider.conf"]
          ports:
            - name: oidc-http
              containerPort: 8008
              protocol: TCP
            - name: oidc-health
              containerPort: 8009
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /live
              port: oidc-health
            failureThreshold: 2
            initialDelaySeconds: 15
            periodSeconds: 60
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: oidc-health
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: oidc-config
              mountPath: /run/spire/oidc-config
              readOnly: true
            # Read server socket to fetch public keys via server_api
            - name: server-sockets
              mountPath: /run/spire/server-sockets
              readOnly: true

      volumes:
        - name: spire-config
          configMap:
            name: spire-server
        - name: oidc-config
          configMap:
            name: spire-oidc
        # Shared socket dir between spire-server and oidc-discovery-provider
        - name: server-sockets
          emptyDir: {}
        # emptyDir for data (sqlite3 + keys). LOCAL-DEV: data is lost on pod
        # restart; agents re-attest automatically. For persistence use a PVC.
        - name: spire-data
          emptyDir: {}
