apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spire-agent
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-agent
        app.kubernetes.io/part-of: spire
    spec:
      serviceAccountName: spire-agent
      # hostPID + hostNetwork: required by the WorkloadAttestor "k8s" plugin
      # so the agent can walk /proc to map a workload PID to its cgroup/pod.
      # These fields force a "privileged" PSA label on the namespace.
      # Source: https://github.com/spiffe/spire-tutorials/blob/main/k8s/quickstart/agent-daemonset.yaml
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Single-node Talos: the control-plane node carries the
      # node-role.kubernetes.io/control-plane taint. Tolerate it so the
      # DaemonSet schedules on control-plane nodes (required when there is
      # only one node and it IS the control-plane).
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      # automountServiceAccountToken=true: the WorkloadAttestor "k8s" calls the
      # kubelet API and authenticates with the DEFAULT SA token at
      # /var/run/secrets/kubernetes.io/serviceaccount/token (it crashed without
      # it). The SEPARATE projected token below (audience "spire-server") is for
      # the k8s_psat NODE attestor — both coexist at different paths.
      automountServiceAccountToken: true
      securityContext:
        # Root: the agent binds the Workload API socket on a root-owned hostPath
        # dir and reads /proc of other pods (hostPID) for workload attestation.
        # nonroot failed with EACCES on the socket bind (verified live). The ns
        # is PSA privileged precisely for this.
        runAsUser: 0
        runAsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      # No wait-for-server init container: the spire-agent image is distroless
      # (no /bin/sh, no nc), and the agent retries the server connection
      # natively, so an init wait is both impossible-as-shell and unnecessary.
      containers:
        - name: spire-agent
          # Pinned digest (v1.11.2, linux/arm64-capable multi-arch index).
          image: ghcr.io/spiffe/spire-agent@sha256:7561ee91bfe07812f335d5b9e564bbb2ab77ef601558898a23177f692db15fc1
          args: ["-config", "/run/spire/config/agent.conf"]
          env:
            # Passed to WorkloadAttestor "k8s" as node_name_env so it can
            # call the kubelet API on the correct node IP.
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          # The agent MUST run as root: it binds the Workload API socket on a
          # hostPath dir (root-owned) and reads /proc of other pods (hostPID)
          # for k8s workload attestation. nonroot failed with EACCES on the
          # socket bind. This is why the ns is PSA privileged. rootfs stays
          # read-only; writable state lives on the spire-agent-data emptyDir.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /live
              port: health
            failureThreshold: 2
            initialDelaySeconds: 15
            periodSeconds: 60
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-bundle
              mountPath: /run/spire/bundle
              readOnly: true
            - name: spire-agent-socket
              mountPath: /run/spire/agent-sockets
            - name: spire-token
              mountPath: /var/run/secrets/tokens
              readOnly: true
            # Writable data_dir (rootfs is read-only). The agent writes
            # agent-data.json (SVID/bundle cache) here.
            - name: spire-agent-data
              mountPath: /run/spire/data
      volumes:
        - name: spire-agent-data
          emptyDir: {}
        - name: spire-config
          configMap:
            name: spire-agent
        # spire-bundle ConfigMap is populated by the server's k8sbundle Notifier.
        # The agent reads bundle.crt from here to verify the server's TLS cert.
        - name: spire-bundle
          configMap:
            name: spire-bundle
        # hostPath: the Workload API socket MUST be on a hostPath so that
        # workload pods (in aegis-core namespace) can mount it via hostPath.
        # The engine init-container mounts /run/spire/agent-sockets read-only.
        # Source: https://github.com/spiffe/spire-tutorials/blob/main/k8s/quickstart/agent-daemonset.yaml
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/agent-sockets
            type: DirectoryOrCreate
        # Projected ServiceAccount token: audience-scoped to "spire-server"
        # so the server's TokenReview call succeeds. Default path matches
        # k8s_psat plugin's token_path default.
        - name: spire-token
          projected:
            sources:
              - serviceAccountToken:
                  path: spire-agent
                  expirationSeconds: 7200
                  audience: spire-server
