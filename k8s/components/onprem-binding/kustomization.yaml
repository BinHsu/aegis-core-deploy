apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# On-prem binding (WS2). The additive layer that makes the provider-neutral
# base a Talos / on-prem target — the mirror of components/aws-binding, per
# ADR-17's "every target = base + its binding component; base stays neutral".
# Included by overlays/talos only.
#
# WS2-2 (ADR-18): the OBJECT-STORE axis. MinIO substitutes the AWS S3 model
# bucket; an init-container mirrors it into the engine's /models CAS store.
#
# WS2-3 (this slice): the IDENTITY axis. SPIRE issues JWT-SVIDs to the engine
# workload; the engine exchanges them at MinIO's STS AssumeRoleWithWebIdentity
# for short-lived creds, replacing the static root-credential model-fetch
# init-container (WS2-2). The MinIO Deployment is patched to trust JWT-SVIDs
# via OIDC (MINIO_IDENTITY_OPENID_*). The engine runs two init-containers:
#   1. fetch-jwt   (spire-agent image, distroless — NO shell): runs
#      `spire-agent api fetch jwt -audience minio -write <dir>` directly as the
#      container command (no /bin/sh, no grep), getting a JWT-SVID over the
#      Workload API socket delivered by the SPIFFE CSI driver.
#   2. model-fetch (aws-cli image): `aws sts assume-role-with-web-identity`
#      against MinIO's STS endpoint exchanges the JWT-SVID for scoped temp creds,
#      then `aws s3 sync` mirrors the bucket into /models. The AWS CLI is the
#      faithful IRSA tool — it natively does AssumeRoleWithWebIdentity and
#      honours AWS_SESSION_TOKEN, so no XML/grep parsing and no static root creds.
#      The required Role ARN comes from the minio-sts ConfigMap (see that file).
#
# WS2-4 Dex (gateway auth, Cognito->) is deferred to the next slice.
resources:
  # --- MinIO (object store) ---
  - minio/secret.yaml
  - minio/deployment.yaml
  - minio/service.yaml
  - minio/networkpolicy.yaml
  - minio/bootstrap-job.yaml
  # --- SPIRE (identity) ---
  - spire/namespace.yaml
  - spire/spire-bundle-configmap.yaml
  - spire/server-serviceaccount.yaml
  - spire/server-rbac.yaml
  - spire/server-configmap.yaml
  - spire/oidc-configmap.yaml
  - spire/server-statefulset.yaml
  - spire/server-service.yaml
  - spire/agent-serviceaccount.yaml
  - spire/agent-rbac.yaml
  - spire/agent-configmap.yaml
  - spire/agent-daemonset.yaml
  - spire/csi-driver.yaml
  - spire/registration-job.yaml
  - spire/minio-policy-configmap.yaml
  - spire/minio-sts-configmap.yaml

# Mirror the base's managed-by label onto these component resources.
labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
    includeSelectors: false

patches:
  # =========================================================================
  # Engine Rollout: SPIRE-aware model-fetch init-container (WS2-3)
  # Replaces the WS2-2 static-credential init-container with the SPIRE flow:
  #   step 1 (fetch-jwt)  — spire-agent image fetches a JWT-SVID via the
  #                         Workload API socket mounted from the node hostPath.
  #   step 2 (model-fetch)— mc image exchanges the JWT at MinIO STS for temp
  #                         creds, then mirrors the bucket into /models.
  #
  # JSON6902 (not strategic merge) because kustomize has no openapi schema
  # for the Rollout CRD.
  # =========================================================================
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: aegis-core-engine
    patch: |-
      - op: add
        path: /spec/template/spec/initContainers
        value:
          # --- step 1: fetch JWT-SVID from SPIRE agent ---
          # The spire-agent image is DISTROLESS — no /bin/sh, no grep. So we run
          # the binary directly as the container command (no shell wrapper) and
          # use `-write` to drop the token into the shared emptyDir, instead of
          # piping stdout through grep. If the agent socket is not ready yet the
          # fetch exits non-zero and the kubelet restarts this init-container —
          # that retry replaces the old shell `until [ -S socket ]` wait loop.
          # The token is written as /run/spire/svid/jwt_svid.token (the default
          # filename for `fetch jwt -write`; confirm with `ls` on first live run).
          # Source: https://spiffe.io/docs/latest/deploying/svids/#jwt-svids
          - name: fetch-jwt
            image: ghcr.io/spiffe/spire-agent@sha256:7561ee91bfe07812f335d5b9e564bbb2ab77ef601558898a23177f692db15fc1
            # audience=minio MUST match MINIO_IDENTITY_OPENID_CLIENT_ID so MinIO
            # accepts the token's `aud` claim.
            command:
              - /opt/spire/bin/spire-agent
              - api
              - fetch
              - jwt
              - -audience
              - minio
              - -socketPath
              - /spiffe-workload-api/spire-agent.sock
              - -write
              - /run/spire/svid
            securityContext:
              runAsNonRoot: true
              # Same uid/gid as model-fetch (and the pod fsGroup) so the written
              # token file is readable by the next init-container.
              runAsUser: 65532
              runAsGroup: 65532
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: "10m"
                memory: "32Mi"
              limits:
                cpu: "100m"
                memory: "64Mi"
            volumeMounts:
              - name: spiffe-workload-api
                mountPath: /spiffe-workload-api
                readOnly: true
              - name: spire-svid
                mountPath: /run/spire/svid

          # --- step 2: STS exchange + model mirror ---
          # The AWS CLI is the faithful IRSA tool: it does AssumeRoleWithWebIdentity
          # natively and honours AWS_SESSION_TOKEN, so there is no XML to grep and
          # no static root credential in this path. The required Role ARN comes
          # from the minio-sts ConfigMap (MinIO role-policy mode mints it at
          # startup — see spire/minio-sts-configmap.yaml).
          # Source: https://min.io/docs/minio/linux/developers/security-token-service/AssumeRoleWithWebIdentity.html
          # Source: https://github.com/minio/minio/blob/master/docs/sts/web-identity.md
          - name: model-fetch
            image: public.ecr.aws/aws-cli/aws-cli@sha256:643507c10ada7964ca6157b3d799f030b90577643da9955d319a77399ed80d73
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                export HOME=/tmp
                export AWS_REGION=us-east-1            # MinIO ignores it; the CLI requires one
                export AWS_EC2_METADATA_DISABLED=true  # never probe IMDS

                JWT="$(cat /run/spire/svid/jwt_svid.token)"

                # Exchange the JWT-SVID for short-lived creds at MinIO's STS
                # endpoint. --query + --output text returns the three fields
                # tab-separated on one line, so cut -f extracts them (no grep -P).
                CREDS="$(aws sts assume-role-with-web-identity \
                  --endpoint-url http://minio:9000 \
                  --role-arn "$ROLE_ARN" \
                  --role-session-name aegis-core-engine \
                  --web-identity-token "$JWT" \
                  --duration-seconds 900 \
                  --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                  --output text)"

                AWS_ACCESS_KEY_ID="$(printf '%s' "$CREDS" | cut -f1)"
                AWS_SECRET_ACCESS_KEY="$(printf '%s' "$CREDS" | cut -f2)"
                AWS_SESSION_TOKEN="$(printf '%s' "$CREDS" | cut -f3)"
                export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN

                if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SESSION_TOKEN" ]; then
                  echo "ERROR: STS exchange returned no credentials." >&2
                  exit 1
                fi
                echo "STS exchange OK; temp AK=${AWS_ACCESS_KEY_ID}"

                # Block until the required model object is present — the bootstrap
                # Job may still be seeding the bucket (preserves WS2-2 semantics:
                # don't let an empty sync "succeed" and fail the engine later).
                until aws s3 ls \
                  s3://aegis-models/whisper-tiny-en/921e4cf8686fdd993dcd081a5da5b6c365bfde1162e72b08d75ac75289920b1f.bin \
                  --endpoint-url http://minio:9000 >/dev/null 2>&1; do
                  echo "waiting for required model object..."; sleep 3
                done

                aws s3 sync s3://aegis-models /models --endpoint-url http://minio:9000
                echo "model CAS populated:"; ls -R /models
            env:
              # The Role ARN MinIO minted for the SPIRE OIDC provider. No root
              # credentials here — the engine path carries identity, not secrets.
              - name: ROLE_ARN
                valueFrom:
                  configMapKeyRef:
                    name: minio-sts
                    key: role_arn
            securityContext:
              runAsNonRoot: true
              runAsUser: 65532
              runAsGroup: 65532
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "500m"
                memory: "256Mi"
            volumeMounts:
              - name: models
                mountPath: /models
              - name: tmp
                mountPath: /tmp
              - name: spire-svid
                mountPath: /run/spire/svid
                readOnly: true

      # Add the spire-agent socket hostPath volume and the svid emptyDir
      # shared between the two init-containers.
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: spire-svid
          emptyDir:
            medium: Memory
            sizeLimit: 8Ki

  # =========================================================================
  # Seed Job: same two-step SPIRE init-container sequence.
  # =========================================================================
  - target:
      group: batch
      version: v1
      kind: Job
      name: aegis-core-engine-seed
    patch: |-
      - op: add
        path: /spec/template/spec/initContainers
        value:
          # Mirror of the engine Rollout's init-containers (see comments above).
          - name: fetch-jwt
            image: ghcr.io/spiffe/spire-agent@sha256:7561ee91bfe07812f335d5b9e564bbb2ab77ef601558898a23177f692db15fc1
            command:
              - /opt/spire/bin/spire-agent
              - api
              - fetch
              - jwt
              - -audience
              - minio
              - -socketPath
              - /spiffe-workload-api/spire-agent.sock
              - -write
              - /run/spire/svid
            securityContext:
              runAsNonRoot: true
              runAsUser: 65532
              runAsGroup: 65532
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: "10m"
                memory: "32Mi"
              limits:
                cpu: "100m"
                memory: "64Mi"
            volumeMounts:
              - name: spiffe-workload-api
                mountPath: /spiffe-workload-api
                readOnly: true
              - name: spire-svid
                mountPath: /run/spire/svid
          - name: model-fetch
            image: public.ecr.aws/aws-cli/aws-cli@sha256:643507c10ada7964ca6157b3d799f030b90577643da9955d319a77399ed80d73
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                export HOME=/tmp
                export AWS_REGION=us-east-1
                export AWS_EC2_METADATA_DISABLED=true
                JWT="$(cat /run/spire/svid/jwt_svid.token)"
                CREDS="$(aws sts assume-role-with-web-identity \
                  --endpoint-url http://minio:9000 \
                  --role-arn "$ROLE_ARN" \
                  --role-session-name aegis-core-engine-seed \
                  --web-identity-token "$JWT" \
                  --duration-seconds 900 \
                  --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                  --output text)"
                AWS_ACCESS_KEY_ID="$(printf '%s' "$CREDS" | cut -f1)"
                AWS_SECRET_ACCESS_KEY="$(printf '%s' "$CREDS" | cut -f2)"
                AWS_SESSION_TOKEN="$(printf '%s' "$CREDS" | cut -f3)"
                export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SESSION_TOKEN" ]; then
                  echo "ERROR: STS exchange returned no credentials." >&2; exit 1
                fi
                aws s3 sync s3://aegis-models /models --endpoint-url http://minio:9000
                echo "model CAS populated:"; ls -R /models
            env:
              - name: ROLE_ARN
                valueFrom:
                  configMapKeyRef:
                    name: minio-sts
                    key: role_arn
            securityContext:
              runAsNonRoot: true
              runAsUser: 65532
              runAsGroup: 65532
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "500m"
                memory: "256Mi"
            volumeMounts:
              - name: models
                mountPath: /models
              - name: tmp
                mountPath: /tmp
              - name: spire-svid
                mountPath: /run/spire/svid
                readOnly: true
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: spire-svid
          emptyDir:
            medium: Memory
            sizeLimit: 8Ki

  # =========================================================================
  # Engine NetworkPolicy: allow egress to MinIO :9000
  # (carried forward from WS2-2 — still needed for STS calls on :9000)
  # Also add egress to spire-system :8081 (SVID issuance from agent via UDS
  # does not require a NetworkPolicy rule — UDS is not network traffic).
  # =========================================================================
  - target:
      group: networking.k8s.io
      version: v1
      kind: NetworkPolicy
      name: aegis-core-engine
    patch: |-
      - op: add
        path: /spec/egress/-
        value:
          to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/name: minio
          ports:
            - port: 9000
              protocol: TCP

  # =========================================================================
  # MinIO Deployment: add OIDC/STS environment variables so MinIO trusts
  # JWT-SVIDs issued by SPIRE for AssumeRoleWithWebIdentity.
  #
  # Config key reference:
  #   Source: https://min.io/docs/minio/linux/reference/minio-server/settings/iam/openid.html
  #   Source: https://github.com/minio/minio/blob/master/docs/sts/web-identity.md
  #
  # Design choices:
  #   MINIO_IDENTITY_OPENID_CONFIG_URL — points to the oidc-discovery-provider
  #     sidecar. Plain HTTP (not HTTPS) because the service is in-cluster and
  #     the oidc-discovery-provider runs with allow_insecure_scheme=true.
  #     LOCAL-DEV shortcut; switch to https:// + serving_cert_file for prod.
  #   MINIO_IDENTITY_OPENID_CLIENT_ID = "minio" — must match the `audience`
  #     requested by `spire-agent api fetch jwt -audience minio`.
  #     MinIO validates that the JWT's `aud` claim contains this value.
  #   MINIO_IDENTITY_OPENID_ROLE_POLICY = "aegis-models-readonly" — the policy
  #     created by the bootstrap Job. Role-policy mode (not claim-name mode)
  #     because SPIRE JWT-SVIDs carry no custom `policy` claim by default.
  #     In role-policy mode MinIO prints a Role ARN at startup; the engine
  #     init-container fetches that ARN dynamically (see patch above).
  #   MINIO_IDENTITY_OPENID_CLIENT_SECRET = "" — SPIRE JWTs are signed by
  #     the SPIRE CA; MinIO validates them via the JWKS endpoint, not a
  #     client secret. The env var is set to empty; MinIO still validates
  #     the signature via /keys from the oidc-discovery-provider.
  # =========================================================================
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: minio
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: MINIO_IDENTITY_OPENID_ENABLE
          value: "on"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: MINIO_IDENTITY_OPENID_CONFIG_URL
          value: "http://spire-oidc.spire-system.svc.cluster.local/.well-known/openid-configuration"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: MINIO_IDENTITY_OPENID_CLIENT_ID
          value: "minio"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: MINIO_IDENTITY_OPENID_CLIENT_SECRET
          value: ""
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: MINIO_IDENTITY_OPENID_ROLE_POLICY
          value: "aegis-models-readonly"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: MINIO_IDENTITY_OPENID_DISPLAY_NAME
          value: "SPIRE"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: MINIO_IDENTITY_OPENID_SCOPES
          value: "openid"

  # =========================================================================
  # MinIO bootstrap-job: add a policy-creation step.
  # We append a second init-container to the existing minio-bootstrap Job
  # that creates the aegis-models-readonly IAM policy on MinIO after the
  # bucket is seeded. This is idempotent (mc admin policy create fails
  # gracefully if the policy exists).
  # =========================================================================
  - target:
      group: batch
      version: v1
      kind: Job
      name: minio-bootstrap
    patch: |-
      - op: add
        path: /spec/template/spec/containers/-
        value:
          name: create-policy
          image: quay.io/minio/mc@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              export MC_CONFIG_DIR=/tmp/mc
              until mc alias set obj http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" 2>/dev/null; do
                echo "waiting for MinIO..."; sleep 2
              done
              # Create the read-only policy (idempotent)
              mc admin policy create obj aegis-models-readonly /policy/aegis-models-readonly.json \
                || echo "policy already exists, continuing"
              echo "MinIO OIDC policy setup complete"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          volumeMounts:
            - name: policy
              mountPath: /policy
              readOnly: true
            - name: tmp
              mountPath: /tmp
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: policy
          configMap:
            name: minio-spire-policy
