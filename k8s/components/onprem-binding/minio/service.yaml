apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: aegis-core
    app.kubernetes.io/component: object-store
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
      protocol: TCP
    - name: console
      port: 9001
      targetPort: console
      protocol: TCP
