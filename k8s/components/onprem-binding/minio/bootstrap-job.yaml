apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bootstrap
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: minio-bootstrap
    app.kubernetes.io/part-of: aegis-core
    app.kubernetes.io/component: object-store-seed
spec:
  # Seeds the MinIO bucket with the engine's required model object. This is the
  # on-prem analogue of the CI step that populates the AWS S3 model bucket
  # (ROADMAP Phase 4c / ldz #85, AWS side still deferred) — ADR-18.
  #
  # Idempotent: `mc mb --ignore-existing` + `mc mirror` skip already-present
  # objects, so re-running after a MinIO restart re-seeds without duplication.
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-bootstrap
        app.kubernetes.io/part-of: aegis-core
        app.kubernetes.io/component: object-store-seed
    spec:
      restartPolicy: OnFailure
      # The populate-sts-arn container (below) needs the SA token to read MinIO's
      # logs and patch the minio-sts ConfigMap, so automount is on and the Job
      # runs as the least-privilege minio-bootstrap SA (bootstrap-rbac.yaml).
      serviceAccountName: minio-bootstrap
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Fetch whisper-tiny-en from its upstream origin and stage it at the
        # CAS path the engine expects: <id>/<sha256>.<ext>. The SHA-256 in the
        # manifest is the integrity anchor — we fetch from HuggingFace `main`
        # (not a pinned revision) but verify the exact content hash, so a
        # changed upstream fails loudly here instead of at engine preflight.
        - name: fetch-model
          image: curlimages/curl@sha256:c1fe1679c34d9784c1b0d1e5f62ac0a79fca01fb6377cdd33e90473c6f9f9a69
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              ID=whisper-tiny-en
              SHA=921e4cf8686fdd993dcd081a5da5b6c365bfde1162e72b08d75ac75289920b1f
              URL=https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin
              DEST="/staging/${ID}/${SHA}.bin"
              mkdir -p "/staging/${ID}"
              echo "fetching ${URL} -> ${DEST}"
              curl -fSL --retry 3 --retry-delay 5 -o "${DEST}" "${URL}"
              echo "${SHA}  ${DEST}" | sha256sum -c -
              echo "fetched + verified ${ID}"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: staging
              mountPath: /staging
      containers:
        # Upload the staged CAS tree into the bucket. Waits for MinIO to be
        # ready, creates the bucket, mirrors the staging dir into it.
        - name: upload
          image: quay.io/minio/mc@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              export MC_CONFIG_DIR=/tmp/mc
              echo "waiting for MinIO..."
              until mc alias set obj http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" 2>/dev/null; do
                sleep 2
              done
              mc ready obj
              mc mb --ignore-existing obj/aegis-models
              mc mirror --overwrite /staging obj/aegis-models
              echo "bucket contents:"
              mc ls --recursive obj/aegis-models
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: staging
              mountPath: /staging
            - name: tmp
              mountPath: /tmp

        # Discover MinIO's derived OIDC Role ARN and write it into the
        # minio-sts ConfigMap, so the engine's STS init-container can read a
        # real ARN instead of the shipped placeholder (WS2-R, gap #1). MinIO
        # runs in role-policy mode: it logs `RoleArn: arn:minio:iam:::role/<hash>`
        # at startup. We poll the log (the ARN is stable across restarts — it is
        # a hash of the OIDC config) and patch the ConfigMap by merge. Runs in
        # parallel with `upload`; both only need MinIO to be up. Uses the same
        # alpine/kubectl image + in-cluster auth pattern as the SPIRE
        # registration Job.
        - name: populate-sts-arn
          image: docker.io/alpine/kubectl@sha256:e5e66d693f2c01b3962e959f4a58cdc0dbc28231dc134177d0d78dc91d742c56
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              KUBECTL="kubectl --server=https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS} \
                       --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                       --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
              echo "waiting for MinIO to log its OIDC RoleArn (role-policy mode)..."
              ARN=""
              for i in $(seq 1 60); do
                ARN="$($KUBECTL -n aegis-core logs deploy/minio 2>/dev/null \
                       | grep -oiE 'arn:minio:iam:::role/[A-Za-z0-9_-]+' | head -n1 || true)"
                [ -n "$ARN" ] && break
                sleep 5
              done
              [ -n "$ARN" ] || { echo "ERROR: MinIO RoleArn not found in logs after ~5min" >&2; exit 1; }
              echo "discovered RoleArn: $ARN"
              $KUBECTL -n aegis-core patch configmap minio-sts --type merge \
                -p "{\"data\":{\"role_arn\":\"$ARN\"}}"
              echo "minio-sts ConfigMap populated."
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      volumes:
        - name: staging
          emptyDir: {}
        - name: tmp
          emptyDir: {}
