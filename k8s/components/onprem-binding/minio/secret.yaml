apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: aegis-core
type: Opaque
# LOCAL-DEV ONLY. These are the MinIO root credentials for the on-prem
# (Talos) object-store substitute. They are deliberately NOT a secret: the
# cluster is ephemeral, single-tenant, and lives only on a developer host.
# The AWS target (overlays/staging, overlays/prod) does NOT use MinIO — it
# binds to a real S3 bucket whose access is IRSA-scoped (components/aws-binding),
# so no credential ships there. When an on-prem deployment ever needs real
# secrecy, this literal Secret is replaced by an ExternalSecret / sealed-secret
# (the same identity-axis substitution WS2-3 introduces). See ADR-18.
stringData:
  MINIO_ROOT_USER: aegis-local
  MINIO_ROOT_PASSWORD: aegis-local-dev-not-a-secret
