apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: aegis-core
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: aegis-core
    app.kubernetes.io/component: object-store
spec:
  # Single replica. This is the on-prem substitute for the AWS S3 bucket that
  # backs the engine's /models CAS store (ADR-18). One node, no distributed
  # erasure set — the bucket holds one small model object, durability is not
  # a goal on an ephemeral local cluster.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/part-of: aegis-core
        app.kubernetes.io/component: object-store
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          # Pinned by multi-arch index digest (resolved 2026-06-16). The index
          # carries linux/arm64, so it runs on the local arm64 Talos.
          image: quay.io/minio/minio@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
          ports:
            - name: s3
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            # Small envelope — one bucket, one ~75 MB object. The 16 GB host
            # has to co-schedule this beside the engine (2-4 Gi); keep MinIO lean.
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        # Ephemeral. Object durability is not a goal here; if the pod restarts,
        # the bootstrap Job re-seeds the bucket (it is idempotent). On a real
        # on-prem deployment this becomes a PVC.
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
