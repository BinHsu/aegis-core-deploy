# Self-registration marker + declared ArgoCD intent (aegis-platform ADR-07).
#
# This file is the repo's explicit OPT-IN to be reconciled: the platform's
# ApplicationSet (SCM-provider generator) only enrols a repo that carries BOTH
# the `aegis-workload` GitHub topic AND this file. Tagging alone is not enough.
#
# ⚠️ This Application is NOT applied directly — do not `kubectl apply` it. The
# platform ApplicationSet RENDERS the effective Application from this repo,
# injecting what a deploy repo cannot know: the cluster region annotation, the
# ECR registry (so this repo commits no account ID), and the engine SA's
# IRSA role-arn (built from the cluster account + the ACK-provisioned role).
# The fields below are the canonical declaration of THIS workload's intent.
#
# ⚠️ implemented, E2E PENDING platform bootstrap — issue #6 gate: "ApplicationSet
# discovers BOTH aegis-workload repos + reconciles them; greeter + aegis-core
# both reconcile green end-to-end".
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-core
  namespace: argocd
spec:
  project: aegis-workloads
  source:
    repoURL: https://github.com/BinHsu/aegis-core-deploy
    targetRevision: HEAD
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: aegis-core # derived from the repo name by the platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
